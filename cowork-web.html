<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowork Remote</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg0: #f5f4ef;
  --bg1: #ffffff;
  --bg2: #ece9e1;
  --bg3: #e5e2da;
  --bg4: #d6d3cb;
  --text1: #1a1a1a;
  --text2: #6b6560;
  --text3: #a39e96;
  --accent: #d97706;
  --accent2: #b45309;
  --blue: #2563eb;
  --blue2: #1d4ed8;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --border: #ddd9d0;
  --sidebar-w: 210px;
  --right-w: 272px;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg0);
  color: var(--text1);
  display: flex;
  height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ─────────────────────────────────────────
   LEFT SIDEBAR
───────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 14px 12px 10px;
  flex-shrink: 0;
}
.logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--text1);
  margin-bottom: 11px;
  letter-spacing: -.2px;
  user-select: none;
}
.logo em { color: var(--accent); font-style: normal; }

.new-chat-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 12.5px;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.new-chat-btn:hover {
  background: var(--bg4);
  color: var(--text1);
  border-color: rgba(217,119,6,.5);
}
.new-chat-btn svg { width: 13px; height: 13px; stroke: currentColor; flex-shrink: 0; }

.search-wrap {
  padding: 6px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 9px;
  border-radius: 6px;
  font-size: 12px;
  outline: none;
  font-family: inherit;
}
.search-input:focus { border-color: rgba(217,119,6,.6); }
.search-input::placeholder { color: var(--text3); }

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0 6px;
}
.chat-list::-webkit-scrollbar { width: 3px; }
.chat-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

.cl-section-label {
  padding: 8px 14px 3px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .6px;
}
.cl-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 10px;
  margin: 1px 5px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text2);
  font-size: 12.5px;
  transition: background .12s;
  overflow: hidden;
}
.cl-item:hover { background: var(--bg2); color: var(--text1); }
.cl-item.active { background: rgba(217,119,6,.12); color: var(--accent); }
.cl-item-icon { font-size: 12px; flex-shrink: 0; }
.cl-item-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cl-item-time { font-size: 10px; color: var(--text3); flex-shrink: 0; }
.cl-empty { padding: 14px 14px; font-size: 12px; color: var(--text3); }

.sidebar-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.status-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text3);
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.dot.on  { background: var(--green); box-shadow: 0 0 5px rgba(34,197,94,.6); }
.dot.off { background: var(--red); }
.dot.wait { background: var(--orange); animation: blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ─────────────────────────────────────────
   CENTER CHAT
───────────────────────────────────────── */
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg0);
}

.chat-topbar {
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-topbar-title {
  flex: 1;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.model-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text3);
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 3px 9px;
  border-radius: 12px;
  flex-shrink: 0;
  cursor: default;
}
.model-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* Messages scroll area */
.messages-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
}
.messages-wrap::-webkit-scrollbar { width: 5px; }
.messages-wrap::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

/* Welcome */
.chat-welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--text3);
  padding: 40px;
  text-align: center;
}
.claude-circle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #d97706, #ea580c);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: #fff;
  font-weight: 800;
  flex-shrink: 0;
  margin-bottom: 2px;
}
.chat-welcome h2 { font-size: 18px; font-weight: 500; color: var(--text2); }
.chat-welcome p { font-size: 13px; color: var(--text3); line-height: 1.75; max-width: 340px; }
.chat-welcome .hint {
  font-size: 12px;
  color: var(--text3);
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: 20px;
  margin-top: 4px;
}

/* Messages */
.messages {
  flex: 1;
  padding: 18px 16px 10px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.msg-group {
  max-width: 720px;
  width: 100%;
  align-self: center;
  display: flex;
  flex-direction: column;
  margin-bottom: 10px;
}
.msg-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.msg-row.user-row  { flex-direction: row-reverse; }
.msg-av {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  margin-top: 2px;
}
.msg-av.user-av  { background: var(--blue);   color: #fff; }
.msg-av.ai-av    { background: linear-gradient(135deg,#d97706,#ea580c); color: #fff; }
.msg-bubble {
  max-width: calc(100% - 42px);
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.65;
  word-break: break-word;
  white-space: pre-wrap;
}
.user-row .msg-bubble {
  background: var(--blue);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.ai-row .msg-bubble {
  background: var(--bg2);
  color: var(--text1);
  border-bottom-left-radius: 4px;
}
.sys-row .msg-bubble {
  background: transparent;
  color: var(--text3);
  font-size: 11.5px;
  text-align: center;
  padding: 2px 8px;
}
.msg-time {
  font-size: 10px;
  color: var(--text3);
  padding: 2px 4px;
  margin-top: 2px;
}
.user-row + .msg-time { text-align: right; }

/* Attachments in messages */
.msg-img { max-width: 220px; border-radius: 8px; display: block; margin-bottom: 6px; cursor: zoom-in; }
.msg-file-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 8px;
  background: rgba(0,0,0,0.12);
  margin-bottom: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.2s;
}
.msg-file-chip:hover { background: rgba(0,0,0,0.22); }

/* Typing indicator */
.typing-wrap {
  padding: 4px 16px 4px;
  display: none;
  align-items: center;
  gap: 8px;
  color: var(--text3);
  font-size: 12px;
  max-width: 720px;
  width: 100%;
  align-self: center;
  flex-shrink: 0;
}
.typing-wrap.show { display: flex; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text3);
  animation: tdot .9s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay:.15s; }
.typing-dots span:nth-child(3) { animation-delay:.3s; }
@keyframes tdot { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

/* Input area */
.input-area {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.attach-preview {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.attach-preview:empty { display: none; }
.aprev { position: relative; display: inline-flex; align-items: center; }
.aprev img { height: 52px; width: 52px; object-fit: cover; border-radius: 8px; }
.fchip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--text2);
}
.fn { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.xbtn {
  position: absolute;
  top: -6px; right: -6px;
  width: 16px; height: 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);
  border-radius: 50%;
  font-size: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.xbtn:hover { background: var(--red); color: #fff; border-color: var(--red); }

.input-box {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  transition: border-color .2s;
}
.input-box:focus-within { border-color: rgba(217,119,6,.5); }
.input-left { display: flex; gap: 2px; flex-shrink: 0; }
.iact {
  background: none; border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 4px 5px;
  border-radius: 5px;
  font-size: 15px;
  line-height: 1;
  transition: all .12s;
}
.iact:hover { background: var(--bg3); color: var(--text1); }
.msg-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text1);
  font-size: 13.5px;
  line-height: 1.55;
  resize: none;
  outline: none;
  min-height: 22px;
  max-height: 120px;
  font-family: inherit;
}
.msg-input::placeholder { color: var(--text3); }
.send-btn {
  width: 32px; height: 32px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.send-btn:hover { background: var(--accent2); }
.send-btn:disabled { background: var(--bg3); cursor: not-allowed; opacity: .5; }
.send-btn svg { width: 16px; height: 16px; fill: #fff; }

/* ─────────────────────────────────────────
   RIGHT PANEL
───────────────────────────────────────── */
.right-panel {
  width: var(--right-w);
  background: var(--bg1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.rp-top {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.rp-top-title { font-size: 12.5px; font-weight: 600; color: var(--text2); flex: 1; }
.rp-badge {
  font-size: 10.5px;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 7px;
  border-radius: 10px;
}
.rp-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.rp-scroll::-webkit-scrollbar { width: 3px; }
.rp-scroll::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

.rp-sec { padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 0; }
.rp-sec:last-child { border-bottom: none; }
.rp-sec-title {
  padding: 8px 14px 4px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* Steps */
.step-list { padding: 0 10px; display: flex; flex-direction: column; gap: 1px; }
.step-item {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 3px 5px;
  border-radius: 5px;
  font-size: 11.5px;
  color: var(--text3);
  line-height: 1.4;
  transition: background .1s;
}
.step-item.active { color: var(--text1); background: rgba(0,0,0,0.10); }
.step-icon { flex-shrink: 0; width: 14px; text-align: center; margin-top: 1px; font-size: 11px; }
.step-text { flex: 1; word-break: break-all; }
.step-empty { padding: 6px 14px; font-size: 11.5px; color: var(--text3); }

/* Project */
.rp-project {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 6px 10px;
  margin: 2px 5px;
  border-radius: 7px;
  cursor: default;
}
.rp-project:hover { background: var(--bg2); }
.proj-ico {
  width: 30px; height: 30px;
  background: var(--bg3);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.proj-name { font-size: 12.5px; font-weight: 500; color: var(--text1); }
.proj-sub  { font-size: 11px; color: var(--text3); }

/* Files */
.file-list { padding: 2px 8px; display: flex; flex-direction: column; gap: 1px; }
.rp-file {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 7px;
  border-radius: 6px;
  cursor: default;
  color: var(--text2);
  font-size: 12px;
  transition: background .1s;
}
.rp-file:hover { background: var(--bg2); }
.rp-file-ico { font-size: 13px; flex-shrink: 0; }
.rp-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rp-file-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 4px;
  background: rgba(34,197,94,.12);
  color: var(--green);
  flex-shrink: 0;
}

/* Connectors */
.conn-list { padding: 4px 12px; display: flex; flex-direction: column; gap: 5px; }
.conn-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 7px;
  font-size: 12px;
  color: var(--text2);
}
.conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.conn-dot.on   { background: var(--green); box-shadow: 0 0 4px rgba(34,197,94,.5); }
.conn-dot.off  { background: var(--red); }
.conn-dot.wait { background: var(--orange); animation: blink 1.5s ease-in-out infinite; }
.conn-name { flex: 1; }
.conn-status { font-size: 10.5px; color: var(--text3); }

/* ─────────────────────────────────────────
   OVERLAYS
───────────────────────────────────────── */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.85); z-index: 1000;
  align-items: center; justify-content: center;
}
.lightbox.show { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; cursor: zoom-out; }

.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text1); padding: 8px 18px;
  border-radius: 20px; font-size: 12.5px;
  opacity: 0; pointer-events: none;
  transition: all .25s; white-space: nowrap; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

    .msg-file-chip { display:inline-flex; align-items:center; gap:6px; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:4px 10px; font-size:12px; color:var(--text2); margin-bottom:4px; }
    .msg-file-chip .file-icon { font-size:14px; }
    .msg-file-chip .file-name { max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .msg-file-chip .file-size { color:var(--text3); font-size:11px; }
    .upload-status { display:flex; align-items:center; gap:8px; padding:8px 14px; margin:4px 0; background:var(--bg2); border-radius:10px; font-size:12px; color:var(--text2); border-left:3px solid var(--accent); }
    .upload-status.success { border-left-color:var(--green); }
    .upload-status.error { border-left-color:var(--red); }
    .thinking-indicator { display:flex; align-items:center; gap:8px; padding:10px 14px; color:var(--text2); font-size:13px; }
    .thinking-dots { display:inline-flex; gap:3px; }
    .thinking-dots span { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:dotPulse 1.4s infinite; }
    .thinking-dots span:nth-child(2) { animation-delay:0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes dotPulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    .msg-attach-row { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
    
.file-download-btn {
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--accent);
  color:white;
  border:none;
  border-radius:8px;
  padding:6px 12px;
  font-size:12px;
  cursor:pointer;
  text-decoration:none;
  margin:2px;
  transition:background 0.2s;
}
.file-download-btn:hover {
  background:var(--accent2);
}
.file-download-btn .dl-icon {
  font-size:14px;
}
.file-download-btn .dl-text {
  font-weight: 500;
}
.file-download-btn .dl-name {
  font-size:11px;
  opacity:0.9;
}
</style>
</head>
<body>

<!-- ═══════════════════════════════
     LEFT SIDEBAR
═══════════════════════════════ -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">Cowork <em>Remote</em></div>
    <button class="new-chat-btn" onclick="createNewChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      새 대화
    </button>
  </div>

  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="대화 검색..."
           id="chatSearch" oninput="filterChats(this.value)">
  </div>

  <div class="chat-list" id="chatList">
    <div class="cl-section-label">최근 대화</div>
  </div>

  <div class="sidebar-footer">
    <div class="status-row">
      <div class="dot wait" id="dotRelay"></div>
      <span id="lblRelay">릴레이 확인 중...</span>
    </div>
    <div class="status-row">
      <div class="dot wait" id="dotBridge"></div>
      <span id="lblBridge">브릿지 확인 중...</span>
    </div>
  </div>
</aside>

<!-- ═══════════════════════════════
     CENTER CHAT
═══════════════════════════════ -->
<main class="chat-main">
  <div class="chat-topbar">

async function sgRaw(table, qs, timeoutMs = 8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${qs}`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY },
      signal: ctrl.signal,
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  } catch(e) {
    if (e.name === 'AbortError') throw new Error('SUPABASE_TIMEOUT: ' + timeoutMs + 'ms 초과. Supabase 프리 티어가 일시정지됐을 수 있습니다. https://supabase.com/dashboard 에서 확인하세요.');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}
async function sp(table, data) {
  const r = await sb.from(table).upsert(data);
  if (r.error) throw r.error;
  return r.data;
}
async function bridgeExec(action, content, timeout = 30000) {
  const id = 'cmd-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  await sp('commands', { id, action, target: '', content: content, status: 'pending' });
  const deadline = Date.now() + timeout;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 1500));
    const rows = await sgRaw('commands', `id=eq.${id}&select=status,result`);
    if (rows.length && (rows[0].status === 'completed' || rows[0].status === 'error')) {
      sb.from('commands').delete().eq('id', id).then(() => {});
      return { ok: rows[0].status === 'completed', data: rows[0].result || '' };
    }
  }
  return { ok: false, data: '(timeout)' };
}

async function extractPptxText(file) {
  if (typeof JSZip === 'undefined') return null;
  try {
    const zip = await JSZip.loadAsync(file);
    const slideFiles = Object.keys(zip.files)
      .filter(n => /^ppt\/slides\/slide\d+\.xml$/.test(n))
      .sort((a,b) => parseInt(a.match(/\d+/)[0]) - parseInt(b.match(/\d+/)[0]));
    if (slideFiles.length === 0) return null;
    let text = '';
    for (const sf of slideFiles) {
      const xml = await zip.files[sf].async('text');
      const num = sf.match(/slide(\d+)/)[1];
      text += '=== Slide ' + num + ' ===\n';
      const paras = xml.match(/<a:p\b[^>]*>[\s\S]*?<\/a:p>/g) || [];
      for (const para of paras) {
        const runs = para.match(/<a:t[^>]*>([\s\S]*?)<\/a:t>/g) || [];
        const line = runs.map(t => t.replace(/<[^>]+>/g,'')).join('').trim();
        if (line) text += line + '\n';
      }
      text += '\n';
    }
    return text.trim() || null;
  } catch(e) { console.warn('JSZip failed (DRM?):', e.message); return null; }
}

async function triggerDrmDeprotect(msgId, fileName) {
      const ext = '.' + fileName.split('.').pop().toLowerCase();

      const cmdId = 'drm-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);

      const psLines = [

        "$msgId = '" + msgId + "'",
        "$fileName = '" + safeFn + "'",
        "$ext = '" + ext + "'",
        "$ts = Get-Date -f 'yyyyMMddHHmmssfff'",
        "$tmpSrc = [IO.Path]::Combine([IO.Path]::GetTempPath(), ('drm_src_' + $ts + $ext))",
        "$tmpOut = [IO.Path]::Combine([IO.Path]::GetTempPath(), ('drm_out_' + $ts + '.pdf'))",
        "$hdrs = @{apikey=$supaKey; Authorization='Bearer ' + $supaKey}",
        "$qM = [Uri]::EscapeDataString($msgId); $qF = [Uri]::EscapeDataString($fileName)",
        '# STEP A: Download DRM file from Supabase (GET only - no writes to Supabase from PS)',
        "$rows = Invoke-RestMethod -Uri ($supaUrl+'/rest/v1/file_chunks?message_id=eq.'+$qM+'&file_name=eq.'+$qF+'&order=chunk_index.asc') -Headers $hdrs",
        "if (-not $rows -or $rows.Count -eq 0) { Write-Output ('FAIL:NoChunks:' + $msgId); return }",
        "$b64 = ($rows | ForEach-Object { $_.data }) -join ''",
        '[IO.File]::WriteAllBytes($tmpSrc, [Convert]::FromBase64String($b64))',
        '# STEP B: COM DRM removal in background job - detects EP login dialog (FED5)',
        '$comJob = Start-Job -ScriptBlock {',
        '  param($src,$out,$ext)',
        '  $ErrorActionPreference = "Stop"',
        '  try {',
        "    if (\$ext -eq '.pptx' -or \$ext -eq '.ppt') {",
        '      Stop-Process -Name POWERPNT -Force -EA 0; Start-Sleep 1',
        '      $app = New-Object -ComObject PowerPoint.Application; $app.Visible = 1',
        '      $pres = $app.Presentations.Open($src, 0, 0, 1); Start-Sleep 8',
        '      $pres.ExportAsFixedFormat($out, 2, 1); $pres.Close(); $app.Quit()',
        "    } elseif (\$ext -eq '.xlsx' -or \$ext -eq '.xls') {",
        '      Stop-Process -Name EXCEL -Force -EA 0; Start-Sleep 1',
        '      $app = New-Object -ComObject Excel.Application; $app.Visible = 0; $app.DisplayAlerts = 0',
        '      $wb = $app.Workbooks.Open($src); Start-Sleep 6',
        '      $wb.ExportAsFixedFormat(0, $out); $wb.Close($false); $app.Quit()',
        "    } elseif (\$ext -eq '.docx' -or \$ext -eq '.doc') {",
        '      Stop-Process -Name WINWORD -Force -EA 0; Start-Sleep 1',
        '      $app = New-Object -ComObject Word.Application; $app.Visible = 0',
        '      $wDoc = $app.Documents.Open($src, 0, 0); Start-Sleep 6',
        '      $wDoc.ExportAsFixedFormat($out, 17, 0); $wDoc.Close($false); $app.Quit()',
        "    } else { throw 'Unsupported: ' + \$ext }",
        "    Write-Output 'COM_DONE'",
        '  } catch {',
        "    Write-Output ('COM_FAIL:' + \$_.Exception.Message)",
        '  }',
        '} -ArgumentList $tmpSrc,$tmpOut,$ext',
        '# [FIX] Record pre-existing FED5 windows BEFORE COM starts (prevents false positives)',
        '$preFed5Ids = @(Get-Process -EA 0 | Where-Object { $_.MainWindowTitle -ne "" -and $_.MainWindowTitle -match "FED5" } | Select-Object -ExpandProperty Id)',
        '# Monitor COM job: 3-min base timeout; if NEW FED5 dialog appears, extend 90s and keep job alive',
        '$epDetected = $false; $comWait = 0; $maxWait = 180',
        'while ($comJob.State -eq "Running" -and $comWait -lt $maxWait) {',
        '  Start-Sleep 2; $comWait += 2',
        '  $newFed5 = Get-Process -EA 0 | Where-Object { $_.MainWindowTitle -ne "" -and $_.MainWindowTitle -match "FED5" -and $preFed5Ids -notcontains $_.Id }',
        '  if ($newFed5 -and -not $epDetected) {',
        '    $epDetected = $true',
        '    # Do NOT kill COM job — EP auto-resolves if already logged in; extend timeout by 90s',
        '    if (($maxWait - $comWait) -lt 90) { $maxWait = $comWait + 90 }',
        '  }',
        '}',
        'if ($comJob.State -ne "Completed") {',
        '  Stop-Job $comJob -EA 0; Remove-Job $comJob -EA 0; Remove-Item $tmpSrc -EA 0',
        '  if ($epDetected) { Write-Output \'EP_LOGIN_REQUIRED\' } else { Write-Output \'COM_TIMEOUT\' }',
        '  return',
        '}',
        '$comOut = (Receive-Job $comJob 2>&1 | Out-String).Trim(); Remove-Job $comJob',
        'if ($comOut -notmatch "COM_DONE") { Remove-Item $tmpSrc -EA 0; Write-Output ("COM_FAIL:" + $comOut); return }',
        'Remove-Item $tmpSrc -ErrorAction SilentlyContinue',
        '$jPath = $tmpOut; $pp = 7655',
        'Start-Job -ScriptBlock {',

      // Insert DRM command

        method: 'POST',

        try {

            headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
          });
          const rows = await rp.json();
          if (rows.length > 0) {
            const s = rows[0].status;
            if (s === 'complete' || s === 'completed' || s === 'error') {
              resultStr = rows[0].result || '';
              break;
            }
          }
        } catch(_e) {}
      }

      // Cleanup command row (browser JS)
      try {
        await fetch(SUPA_URL + '/rest/v1/commands?id=eq.' + encodeURIComponent(cmdId), {
          method: 'DELETE',
          headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Prefer': 'return=minimal' }
        });
      } catch(_e) {}

      if (!resultStr) return { ok: false, err: 'DRM 변환 타임아웃 (150초)' };

      // SERVING:PORT -> browser fetches from local PS HTTP server, uploads to Supabase via browser JS
      // EP / COM / FAIL result checks
      if (resultStr.startsWith('FAIL:')) {
        return { ok: false, err: 'PS 오류: ' + resultStr.slice(5, 300) };

      if (resultStr.startsWith('EP_LOGIN_REQUIRED')) {
        const shouldRetry = await showEPLoginModal();

        return { ok: false, error: 'DRM 변환 타임아웃 (2분 30초) - Office 응답 없음' };
      }
      if (resultStr.startsWith('COM_FAIL:')) {
        return { ok: false, error: 'COM 오류: ' + resultStr.slice(9) };
      }
      if (resultStr.startsWith('SERVING:')) {
        const srvPort = resultStr.replace('SERVING:', '').trim();
        toast('📥 DRM 해쀜 파일 수신 중... (localhost:' + srvPort + ')');

        let b64 = null;
        for (let attempt = 0; attempt < 12; attempt++) {
          await new Promise(r => setTimeout(r, 2000));
          try {
            const fr = await fetch('http://localhost:' + srvPort + '/');
            if (fr.ok) {
              b64 = await fr.text();
              if (b64 && b64.length > 100) break;
            }
          } catch(_e) {}
        }
        if (!b64 || b64.length < 100) return { ok: false, err: '로컬 서버에서 파일 수신 실패 (port:' + srvPort + ')' };

        // Delete original DRM chunks (browser JS to Supabase)
        const hd = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Prefer': 'return=minimal' };
        await fetch(SUPA_URL + '/rest/v1/file_chunks?message_id=eq.' + encodeURIComponent(msgId) + '&file_name=eq.' + encodeURIComponent(fileName), {
          method: 'DELETE', headers: hd
        });

        // Upload DRM-free chunks (browser JS to Supabase)
        const chunkSize = 100000;
        const totalChunks = Math.ceil(b64.length / chunkSize);
        const hu = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
        for (let ci = 0; ci < totalChunks; ci++) {
          const up = await fetch(SUPA_URL + '/rest/v1/file_chunks', {
            method: 'POST', headers: hu,
            body: JSON.stringify({ message_id: msgId, file_name: fileName, chunk_index: ci, total_chunks: totalChunks, data: b64.slice(ci * chunkSize, (ci + 1) * chunkSize) })
          });
          if (!up.ok) return { ok: false, err: '청크 업로드 실패 (' + ci + '/' + totalChunks + '): ' + up.status };
        }
        return { ok: true };
      }

      return { ok: false, err: '예상치 못한 결과: ' + resultStr.slice(0, 200) };
    }

async function sendMessage() {
  const inp  = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text && !attachments.length) return;
  if (!chatId) return;
  if (!relayOnline) { toast('릴레이가 오프라인입니다'); return; }

  const msgId = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);

  /* Optimistic UI */
  const imgs  = attachments.filter(a => a.type === 'image');
  const fileAtts = attachments.filter(a => a.type === 'file');
  const textExtracted = attachments.filter(a => a.type === 'text-extracted');
  let extractedContent = '';
  for (const att of textExtracted) {
    extractedContent += '\n\n=== 첨부파일: ' + att.name + ' ===\n' + att.extractedText + '\n=== 끝 ===';
  }
  appendMsg({ id: msgId, role:'user', content: (text || '파일 분석 요청') + extractedContent,
    attachments: imgs.map(a=>({type:'image',name:a.name,data:a.data})),
    files: fileAtts.map(a=>({name:a.name,size:a.size})) });

  document.getElementById('chatWelcome').style.display = 'none';
  document.getElementById('msgContainer').style.display = 'flex';

  const title = text.slice(0,30) + (text.length>30?'...':'') || '[m��일 첨부]';
  upsertHistory(chatId, title);
  document.getElementById('chatTitle').textContent = title;

  inp.value = ''; autoResize();
  const savedAttachments = [...attachments];
  attachments = []; renderAttachRow();
  setWaiting(true); resetProgress();
  scrollBot();

  try {
    /* STEP 1: Upload files as base64 chunks via REST API */
    const fileRefs = [];
    const filesToUpload = savedAttachments.filter(a => a.type === 'file');
    const CHUNK_SIZE = 10000; /* ~200KB per chunk (base64) */

    for (let i = 0; i < filesToUpload.length; i++) {
      const att = filesToUpload[i];
      toast('파일 업로드 중...(' + (i+1) + '/' + filesToUpload.length + ')');

      try {
        /* Read file as base64 (use cached data URL if available) */
        const base64 = (att.data && att.data.includes(','))
          ? att.data.split(',')[1]
          : await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1] || reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(att.file);
          });

        /* Split into chunks */
        const totalChunks = Math.ceil(base64.length / CHUNK_SIZE);

        for (let ci = 0; ci < totalChunks; ci++) {
          const chunkData = base64.slice(ci * CHUNK_SIZE, (ci + 1) * CHUNK_SIZE);
          const _cr = await fetch(SUPA_URL + '/rest/v1/file_chunks', {
              method: 'POST',
              headers: {
                'apikey': SUPA_KEY,
                'Authorization': 'Bearer ' + SUPA_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({
                message_id: msgId,
                file_name: att.name,
                chunk_index: ci,
                total_chunks: totalChunks,
                data: chunkData,
                file_size: att.size
              })
            });
            if (!_cr.ok) {
              const _et = await _cr.text();
              throw new Error('HTTP ' + _cr.status + ': ' + _et.slice(0, 200));
            }
        }

        fileRefs.push({ name: att.name, size: att.size, type: att.type, chunks: totalChunks });
        toast('업로드 완료: ' + att.name + ' (' + totalChunks + '청크)');
      } catch (e) {
        toast('파일 업로드 실패: ' + att.name + ' - ' + e.message);
        setWaiting(false);
        return;
      }
    }

        /* STEP 1.5: DRM 선처리 — 회사 PC에서 Office COM으로 DRM 해제 후 relay가 일반 파일 다운로드 */
    const drmExts = ['.pptx', '.ppt', '.docx', '.doc', '.xlsx', '.xls'];
    for (const att of filesToUpload) {
      const attExt = '.' + att.name.split('.').pop().toLowerCase();
      if (drmExts.includes(attExt)) {
        toast('🔄 DRM 변환 중: ' + att.name + ' (30~60초 소요)...');
        const drmResult = await triggerDrmDeprotect(msgId, att.name);
        if (!drmResult.ok) {
          toast('❌ DRM 변환 실패: ' + att.name + '\n오류: ' + drmResult.err);
          setWaiting(false);
          return;
        }
        toast('✅ DRM 변환 완료: ' + att.name);
      }
    }

/* STEP 2: Insert message with file metadata */
    const messageData = {
      id: msgId,
      chat_id: chatId,
      role: 'user',
      content: (text || '파일 분석 요청') + extractedContent,
      status: 'pending',
      files: fileRefs.length > 0 ? fileRefs : null
    };

    await sp('messages', messageData);
    startPolling(2000);
    startWatchdog(msgId, chatId);  // 응답 없음 자동 감지 시작
  } catch(e) {
    toast('전송 실패: ' + e.message);
    setWaiting(false);
  }
}

async function handleFileInput(input) {
  for (const f of input.files) {
    const ext = f.name.split('.').pop().toLowerCase();
    if (f.type.startsWith('image/') || ['png','jpg','jpeg','gif','webp','bmp'].includes(ext)) {
      attachments.push({
        type:'image',
        name:f.name,
        data: await readDataURL(f),
        size: f.size,
        file: f
      });
    } else if (['pptx','ppt'].includes(ext)) {
      const extracted = await extractPptxText(f);
      if (extracted) {
        attachments.push({ type:'text-extracted', name:f.name, extractedText:extracted, size: f.size });
        toast('✅ ' + f.name + ' 텍스트 완료 (브라우저)');
      } else {
        try {
          attachments.push({ type:'file', name:f.name, data: await readDataURL(f), size: f.size });
          toast('⚠️ DRM: ' + f.name + ' → Bridge로 예정');
        } catch(e2) { toast('읽기 실패: ' + f.name); }
      }
    } else {
      try {
        attachments.push({ type:'file', name:f.name, data: await readDataURL(f), size: f.size });
      } catch {
        toast('읽기 실패: ' + f.name);
      }    }
  }
  input.value = ''; renderAttachRow();
}

    function readDataURL(f) { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(f); }); }
function readText(f)    { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsText(f,'UTF-8'); }); }

document.addEventListener('paste', async e => {

function stripFileData(text) {
  if (!text) return '';
  let t = text;
  t = t.replace(/\n*--- 첨부 파일 내용 ---[\s\S]*$/m, '');
  t = t.replace(/\n*\[ATTACHED_FILE:[\s\S]*?\[\/ATTACHED_FILE\]\n*/g, '');
  t = t.replace(/\n*\[첨부파일 크기 초과:[^\]]*\]/g, '');
  return t.trim() || '파일 분석 요청';
}

function extractFileNames(text) {
  const names = [];
  const r1 = text.matchAll(/\[ATTACHED_FILE:([^\]]+)\]/g);
  for (const m of r1) names.push(m[1]);
  return { names };
}

function showThinkingStatus(msg) {

function appendMsg(msg) {
  const container = document.getElementById('msgContainer');
  let grp = document.getElementById('m-' + msg.id);
  if (grp) {
    const mc = grp.querySelector('.mc');
    if (mc) mc.textContent = parseContent(msg.content || '');
    updateProgress(msg); return;
  }

  const time = msg.created_at
    ? new Date(msg.created_at).toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' })
    : '';

  grp = document.createElement('div');
  grp.id   = 'm-' + msg.id;
  grp.className = 'msg-group';

  if (msg.role === 'system') {
    grp.innerHTML = `<div class="msg-row sys-row"><div class="msg-bubble">${esc(msg.content||'')}</div></div>`;
  } else {
    const isUser = msg.role === 'user';
    const rowCls = isUser ? 'user-row' : 'ai-row';
    const avCls  = isUser ? 'user-av'  : 'ai-av';
    const avTxt  = isUser ? '나'        : 'C';

    let att = '';

    /* Render legacy attachments (images) */
    (msg.attachments || []).forEach(a => {
      if (a.type==='image') att += `<img class="msg-img" src="${a.data}" onclick="lightbox('${a.data}')">`;
      else                  att += `<div class="msg-file-chip" data-mid="${msg.id}" data-fn="${esc(a.name)}" onclick="downloadAttachment(this.dataset.mid,this.dataset.fn)">📄 ${esc(a.name)} ⬇️</div>`;
    });

    /* Render files from Storage (new msg.files JSONB column) */
    (msg.files || []).forEach(f => {
      if (isUser) {
        att += `<div class="msg-file-chip">📄 ${esc(f.name)}</div>`;
      } else {
        att += `<a class="file-download-btn" href="${f.url}" target="_blank" download>
          <span class="dl-icon">⬇️</span>
          <span class="dl-text">다운로드</span>
          <span class="dl-name">${esc(f.name)}</span>
        </a>`;
      }
    });

    const content = parseContent(msg.content || '');
    grp.innerHTML = `
      <div class="msg-row ${rowCls}">
        <div class="msg-av ${avCls}">${avTxt}</div>
        <div class="msg-bubble">${att}<div class="mc">${esc(content)}</div></div>
      </div>
      ${time ? `<div class="msg-time">${time}</div>` : ''}
    `;
    updateProgress(msg);
    if (!isUser) findFilesInText(content);
  }
  container.appendChild(grp);
}

function parseContent(raw) {
  if (!raw) return '';
  const t = raw.trim();
  if (t.startsWith('{')) {
    try {
      const p = JSON.parse(t);
      if (p.text)    return p.text;
      if (p.content) return p.content;
      if (p.error)   return '⚠️ ' + p.error;
    } catch(e) {}
  }
  return raw;
}

function resetProgress() {
  document.getElementById('rpBadge').textContent = '—';
  document.getElementById('rpStepList').innerHTML = '<div class="step-empty">작업이 시작되면 단계별 진행이 표시됩니다.</div>';
  document.getElementById('rpFileSec').style.display = 'none';
  document.getElementById('rpFileList').innerHTML = '';
}

function updateProgress(msg) {
  if (!msg.content) return;
  let p = null;
  try { const t=(msg.content||'').trim(); if(t.startsWith('{')) p=JSON.parse(t); } catch(e){}
  if (!p) return;

  if (p.steps && p.steps.length) renderSteps(p.steps, p.step);
  if (p.tools) p.tools.forEach(t => { if(t.target&&t.target.includes('\\')) addFile(t.target); });
}

function renderSteps(steps, active) {
  document.getElementById('rpBadge').textContent = steps.length + '단계';
  const ICONS = {'✅':'✅','❌':'❌','🧠':'🧠','⚡':'⚡','🔧':'🔧','🔄':'🔄','📝':'📝','💬':'💬','🔌':'🔌','⚠️':'⚠️'};
  document.getElementById('rpStepList').innerHTML = steps.slice(-18).map(s => {
    const firstChar = [...s][0];
    const icon = ICONS[firstChar] || '▸';
    const text = s.replace(/^[\u2705\u274C\u{1F9E0}\u26A1\u{1F527}\u{1F504}\u{1F4DD}\u{1F4AC}\u{1F50C}\u26A0]\s*/u,'').replace(/^▸\s*/,'');
    const isActive = s === active;
    return `<div class="step-item${isActive?' active':''}">
      <span class="step-icon">${icon}</span>
      <span class="step-text">${esc(text||s)}</span>
    </div>`;
  }).join('');
}

function findFilesInText(text) {
  const rx = /([A-Z]:\\[^\s\n"'<>]+\.[a-zA-Z0-9]{2,6})/g;
  let m; while((m=rx.exec(text))!==null) addFile(m[1]);
}

function addFile(path) {
  const sec  = document.getElementById('rpFileSec');
  const list = document.getElementById('rpFileList');
  sec.style.display = '';
  const name = path.split('\\').pop();
  if ([...list.querySelectorAll('.rp-file-name')].some(el=>el.textContent===name)) return;
  const ext  = name.split('.').pop().toLowerCase();
  const ico  = {'docx':'📝','doc':'📝','xlsx':'📊','xls':'📊','pptx':'📑','ppt':'📑',
                'pdf':'📕','png':'🖼️','jpg':'🖼️','jpeg':'🖼️','js':'⚙️','ts':'⚙️',
                'bat':'⚡','ps1':'⚡','hwp':'📋','hwpx':'📋'}[ext] || '📄';
  const d = document.createElement('div');
  d.className = 'rp-file';
  d.innerHTML = `<span class="rp-file-ico">${ico}</span><span class="rp-file-name" title="${esc(path)}">${esc(name)}</span><span class="rp-file-badge">생성됨</span>`;
  list.appendChild(d);
}

function startPolling(iv=5000){ stopPolling(); pollMessages(); pollTimer=setInterval(pollMessages,iv); }
function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

async function pollMessages() {
  if (!chatId) return;
  try {
    const msgs = await sgRaw('messages',
      `chat_id=eq.${chatId}&order=created_at.asc&select=id,role,content,status,created_at,attachments,files`);
    let hasNew = false;
    msgs.forEach(m => {
      const ex = document.getElementById('m-'+m.id);
      if (ex) {
        const mc = ex.querySelector('.mc');
        const parsed = parseContent(m.content||'');
        if (mc && mc.textContent !== parsed) { mc.textContent = parsed; scrollBot(); }
        updateProgress(m);
      } else {
        appendMsg(m);
        if (m.role==='assistant') hasNew = true;
      }
    });
    if (hasNew) {
      scrollBot();
      const last = [...msgs].reverse().find(m=>m.role==='assistant');
      if (last && (last.status==='completed'||last.status==='error')) {
        setWaiting(false); startPolling(5000);
      }
    }
  } catch(e) { console.error('poll:', e); }
}

function setupRealtime() {
  if (rtChannel) sb.removeChannel(rtChannel);
  if (!chatId) return;
  rtChannel = sb.channel('rt-'+chatId)
    .on('postgres_changes',
      { event:'*', schema:'public', table:'messages', filter:`chat_id=eq.${chatId}` },
      payload => {
        const m = payload.new; if (!m) return;
        const ex = document.getElementById('m-'+m.id);
        const parsed = parseContent(m.content||'');
        if (ex) { const mc=ex.querySelector('.mc'); if(mc) mc.textContent=parsed; updateProgress(m); }
        else appendMsg(m);
        scrollBot();
        if (m.role==='assistant' && (m.status==='completed'||m.status==='error')) setWaiting(false);
      })
    .subscribe();
}

async function checkRelay() {
  try {
    const rows = await sgRaw('commands', 'id=eq.relay-heartbeat&select=result,content');
    if (rows.length && rows[0].result) {
      const ago = Math.floor((Date.now()-new Date(rows[0].result).getTime())/1000);
      if (ago < 90) {
        relayOnline = true;
        const busy = rows[0].content === 'busy';
        setStatus('Relay','on', busy?'처리 중':'온라인');
        return;
      }
    }
    relayOnline = false; setStatus('Relay','off','시간 초과');
  } catch(e) {
    relayOnline = false;
    if (e.message && e.message.startsWith('SUPABASE_TIMEOUT')) {
      setStatus('Relay','off','⚠️ Supabase 일시정지');
      showSupabasePausedWarning();
    } else {
      setStatus('Relay','off','연결 오류');
    }
  }
}
async function checkBridge() {
  try {
    const rows = await sgRaw('commands', 'id=eq.bridge-heartbeat&select=result');
    if (rows.length && rows[0].result) {
      const ago = Math.floor((Date.now()-new Date(rows[0].result).getTime())/1000);
      if (ago < 120) { bridgeOnline=true; setStatus('Bridge','on','온라인'); return; }
    }
    bridgeOnline=false; setStatus('Bridge','wait','대기 중');
  } catch { bridgeOnline=false; setStatus('Bridge','off','연결 오류'); }
}

/* Bridge → Supabase 하트비트 전송 (relay가 Bridge 온라인 여부를 판단하는 데 사용) */
async function sendBridgeHeartbeat() {
  try {
    const tsVal = new Date().toISOString();
    const _hd = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' };
    await fetch(SUPA_URL + '/rest/v1/commands?on_conflict=id', {
      method: 'POST', headers: _hd,
      body: JSON.stringify({ id: 'bridge-heartbeat', action: 'heartbeat', target: 'bridge', content: 'online', status: 'completed', result: tsVal }),
    });
    if (!bridgeOnline) { bridgeOnline=true; setStatus('Bridge','on','온라인'); }
  } catch(e) { /* silent — network 일시 오류 무시 */ }
}

let _supabaseWarnShown = false;
function showSupabasePausedWarning() {
  if (_supabaseWarnShown) return;
  _supabaseWarnShown = true;
  toast('⚠️ Supabase 연결 안됨 — 프리 티어 일시정지 가능성. supabase.com/dashboard 확인 필요', 10000);
}

/* sys_log 새로고침 */
async function refreshSysLog() {
  const container = document.getElementById('sysLogList');
  if (!container) return;
  container.textContent = '로딩 중...';
  try {
    const rows = await sgRaw('sys_log',
      'order=created_at.desc&limit=30&select=level,event,detail,created_at,version');
    if (!rows || rows.length === 0) {
      container.innerHTML = '<div style="color:var(--text3);padding:4px 0;">로그 없음 (sys_log 테이블이 없을 수 있음)</div>';
      return;
    }
    container.innerHTML = rows.map(r => {
      const t = new Date(r.created_at).toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      const lvlColor = r.level === 'error' || r.level === 'fatal' ? '#ef4444'
        : r.level === 'warn' ? '#f59e0b' : '#6b6560';
      const detail = r.detail ? String(r.detail).slice(0, 120) : '';
      return `<div style="border-bottom:1px solid var(--border);padding:3px 0;">
        <span style="color:${lvlColor};font-weight:600;">[${r.level}]</span>
        <span style="color:var(--text1);margin-left:3px;">${esc(r.event)}</span>
        <span style="color:var(--text3);font-size:9.5px;margin-left:4px;">${t}</span>
        ${detail ? `<div style="color:var(--text2);font-size:9.5px;margin-top:1px;word-break:break-all;">${esc(detail)}</div>` : ''}
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = `<div style="color:#ef4444;font-size:10px;">${esc(e.message.slice(0, 200))}</div>`;
  }
}

function setStatus(which, state, label) {
  // Sidebar dots
  const dot = document.getElementById('dot'+which);
  const lbl = document.getElementById('lbl'+which);
  if (dot) dot.className = 'dot '+state;
  if (lbl) lbl.textContent = which==='Relay' ? '릴레이 ('+label+')' : '브릿지 ('+label+')';
  // Right panel connector dots
  const cd  = document.getElementById('connDot'+which);
  const cl  = document.getElementById('connLbl'+which);
  if (cd)   cd.className = 'conn-dot '+state;
  if (cl)   cl.textContent = label;
}

/* ════════════════════════════════════════
   UTILITIES
════════════════════════════════════════ */
function scrollBot() {
  const w = document.getElementById('messagesWrap');
  w.scrollTop = w.scrollHeight;
}
function setWaiting(on) {
  if (!on) stopWatchdog();   // 응답 왔으면 감시 중단
  waiting = on;
  document.getElementById('typingWrap').classList.toggle('show', on);
  document.getElementById('sendBtn').disabled = on;
}
/* ════════════════════════════════════════
   WATCHDOG — 응답 없음 자동 감지 & 자가진단
   프롬프트 전송 후 45초 내 응답 없으면:
   1. relay 상태 확인
   2. relay가 죽었으면 → 사용자에게 알림 메시지 삽입
   3. relay가 살아있으면 → auto_debug 명령 전송 → relay가 Claude CLI로 자가진단
════════════════════════════════════════ */
const WATCHDOG_TIMEOUT_MS = 45000;

function startWatchdog(msgId, cid) {
  stopWatchdog();
  watchdogMsgId = msgId;
  watchdogTimer = setTimeout(() => runWatchdog(msgId, cid), WATCHDOG_TIMEOUT_MS);
}
function stopWatchdog() {
  if (watchdogTimer) { clearTimeout(watchdogTimer); watchdogTimer = null; }
  watchdogMsgId = null;
}

async function runWatchdog(origMsgId, cid) {
  if (!waiting || debugInProgress) return;
  debugInProgress = true;
  console.warn('[Watchdog] 응답 없음 감지 — 자가진단 시작');

  // 1. relay 상태 재확인
  let relayAgoSec = 9999;
  try {
    const rows = await sgRaw('commands', 'id=eq.relay-heartbeat&select=result,content', 6000);
    if (rows.length && rows[0].result) {
      relayAgoSec = Math.floor((Date.now() - new Date(rows[0].result).getTime()) / 1000);
    }
  } catch(e) {
    // Supabase 타임아웃 = 프리 티어 일시정지
    appendSystemMsg(cid, '⚠️ **Supabase 연결 불가**\n\nSupabase 프리 티어 프로젝트가 일시정지됐을 수 있습니다.\n\n**해결 방법:**\n1. [Supabase 대시보드](https://supabase.com/dashboard) 접속\n2. 프로젝트 → "Restore project" 클릭\n3. 1~2분 후 재시도');
    debugInProgress = false;
    setWaiting(false);
    return;
  }

  if (relayAgoSec > 90) {
    // relay 오프라인
    appendSystemMsg(cid, `⚠️ **릴레이 응답 없음** (마지막 응답: ${relayAgoSec}초 전)\n\n**해결 방법:**\n1. 홈 PC에서 relay-worker-v31.js 실행 중인지 확인\n2. 터미널에서: \`node relay-worker-v31.js\`\n3. 또는 자동 재시작: \`bash relay-start.sh\``);
    debugInProgress = false;
    setWaiting(false);
    return;
  }

  // relay 살아있음 → auto_debug 명령 전송
  appendSystemMsg(cid, '🔍 **자가진단 중...** (릴레이가 오류를 분석하고 있습니다)');

  const debugId = 'auto-debug-' + Date.now();
  try {
    // 메시지 상태와 sys_log 오류를 수집해서 relay에 진단 명령 전송
    let recentErrors = '없음';
    try {
      const errRows = await sgRaw('sys_log', 'level=in.(error,fatal)&order=created_at.desc&limit=5&select=event,detail,created_at', 5000);
      if (errRows && errRows.length > 0) {
        recentErrors = errRows.map(r => `[${r.event}] ${(r.detail||'').slice(0,100)}`).join('\n');
      }
    } catch(e) { recentErrors = '(sys_log 접근 불가)'; }

    const debugCtx = JSON.stringify({
      trigger: 'no_response_45s',
      origMsgId: origMsgId.slice(0, 12),
      chatId: cid,
      recentErrors,
      timestamp: new Date().toISOString(),
    });

    const _hd = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
    await fetch(SUPA_URL + '/rest/v1/commands', {
      method: 'POST', headers: _hd,
      body: JSON.stringify({ id: debugId, action: 'auto_debug', target: cid, content: debugCtx, status: 'pending' }),
    });

    // 최대 60초 대기 — relay가 진단 결과를 messages에 삽입
    const deadline = Date.now() + 60000;
    while (Date.now() < deadline) {
      await new Promise(r => setTimeout(r, 3000));
      try {
        const cmdRows = await sgRaw('commands', `id=eq.${debugId}&select=status,result`, 5000);
        if (cmdRows && cmdRows.length && (cmdRows[0].status === 'completed' || cmdRows[0].status === 'error')) {
          // relay가 결과를 messages에 직접 삽입했으므로 polling이 자동으로 표시
          break;
        }
      } catch(e) { break; }
    }
  } catch(e) {
    appendSystemMsg(cid, '❌ 자가진단 명령 전송 실패: ' + e.message.slice(0, 100));
  }
  debugInProgress = false;
  setWaiting(false);
}

function appendSystemMsg(cid, mdText) {
  if (cid !== chatId) return;
  const sysId = 'sys-' + Date.now();
  appendMsg({ id: sysId, role: 'system', content: mdText, status: 'completed', created_at: new Date().toISOString() });
  scrollBot();
}

function lightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function setupInput() {
  const inp = document.getElementById('msgInput');
  inp.addEventListener('keydown', e => {
      if (e.key==='Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        sendMessage();
      }
    });
    inp.addEventListener('input', autoResize);
}
function autoResize() {
  const inp = document.getElementById('msgInput');
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, dur=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

async function downloadAttachment(msgId, fileName) {
  toast('📥 다운로드 중...');
  try {
    const chunks = await sgRaw('file_chunks',
      `message_id=eq.${msgId}&file_name=eq.${encodeURIComponent(fileName)}&order=chunk_index.asc`);
    if (!chunks.length) { toast('❌ 파일 데이터 없음'); return; }
    const b64 = chunks.map(c => c.data).join('');
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    const blob = new Blob([arr]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('✅ 다운로드: ' + fileName);
  } catch(e) { toast('❌ 실패: ' + e.message); }
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', async () => {
  try { setupInput(); } catch(e) { console.error('setupInput:', e); }
  try { loadHistory(); } catch(e) { console.error('loadHistory:', e); }
  try { createNewChat(); } catch(e) { console.error('createNewChat:', e); }
  // Status checks are independent — always run even if init fails
  setInterval(checkRelay,     15000);
  setInterval(checkBridge,    30000);
  setInterval(sendBridgeHeartbeat, 20000);  // Bridge → Supabase 하트비트 (relay가 bridge 온라인 감지용)
  setInterval(refreshSysLog,  60000);  // sys_log auto-refresh every 60s
  await Promise.all([checkRelay(), checkBridge(), sendBridgeHeartbeat()]);
  setTimeout(refreshSysLog, 3000);  // initial sys_log load after 3s
});

/* Chrome extension overlay gap fix (v30 - no feedback loop) */
(function fixExtensionGap() {
  /* 1. Inject CSS to permanently hide extension overlays - no JS polling needed */
  var s = document.createElement('style');
  s.id = 'ext-gap-fix-css';
  s.textContent = '[id*="claude-agent"],[id*="claude-glow"]{display:none!important;width:0!important;height:0!important;position:fixed!important;}';
  document.head.appendChild(s);

  /* 2. One-time layout fix + resize handler (NO MutationObserver, NO setInterval) */
  var lastW = 0;
  function fixLayout() {
    var rp   = document.querySelector('.right-panel');
    var main = document.querySelector('.chat-main');
    var sb   = document.querySelector('.sidebar');
    if (!rp || !main || !sb) return;
    var w = window.innerWidth - sb.offsetWidth - rp.offsetWidth;
    if (w > 200 && Math.abs(w - lastW) > 2) {
      lastW = w;
      main.style.cssText = 'flex: 0 0 ' + w + 'px !important; min-width: 0 !important;';
    }
  }

  /* Apply after DOM ready (slight delay for layout to settle) */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(fixLayout, 100); });
  } else {
    setTimeout(fixLayout, 100);
  }

  /* Re-apply only on window resize */
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(fixLayout, 150);
  });
})();
