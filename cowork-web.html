<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowork Remote</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg0: #0d1117; --bg1: #161b22; --bg2: #21262d; --bg3: #30363d;
  --text1: #f0f6fc; --text2: #c9d1d9; --text3: #8b949e;
  --accent: #58a6ff; --accent2: #388bfd;
  --green: #3fb950; --red: #f85149; --orange: #d29922; --purple: #bc8cff;
  --border: #30363d; --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg0); color: var(--text2); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* TOP BAR */
.topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--bg1); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
.logo { font-size: 15px; font-weight: 700; color: var(--text1); }
.logo span { color: var(--accent); }
.status-pills { display: flex; gap: 8px; margin-left: auto; }
.pill { display: flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; background: var(--bg2); border: 1px solid var(--border); color: var(--text3); }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot.on { background: var(--green); box-shadow: 0 0 5px var(--green); }
.dot.off { background: var(--red); }
.dot.wait { background: var(--orange); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

/* 3-PANEL LAYOUT */
.panels { display: flex; flex: 1; overflow: hidden; }

/* FILE EXPLORER (left) */
.file-panel { width: 240px; background: var(--bg1); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.file-panel-header { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.file-panel-header .title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.path-bar { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border-bottom: 1px solid var(--border); background: var(--bg2); }
.path-bar input { flex: 1; background: transparent; border: none; color: var(--text1); font-size: 12px; font-family: 'Consolas', monospace; outline: none; }
.path-bar button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; padding: 2px; }
.file-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
.tree-item { display: flex; align-items: center; gap: 6px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: var(--text2); user-select: none; }
.tree-item:hover { background: var(--bg2); }
.tree-item.active { background: var(--bg2); color: var(--accent); }
.tree-item .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.tree-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-item .size { margin-left: auto; font-size: 11px; color: var(--text3); flex-shrink: 0; }
.tree-loading { padding: 12px; text-align: center; color: var(--text3); font-size: 12px; }

/* EDITOR (center) */
.editor-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
.editor-tabs { display: flex; background: var(--bg1); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
.editor-tab { display: flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 12px; color: var(--text3); cursor: pointer; border-right: 1px solid var(--border); white-space: nowrap; max-width: 180px; }
.editor-tab:hover { background: var(--bg2); }
.editor-tab.active { background: var(--bg2); color: var(--text1); border-bottom: 2px solid var(--accent); }
.editor-tab .close { font-size: 14px; opacity: .5; margin-left: 4px; }
.editor-tab .close:hover { opacity: 1; color: var(--red); }
.editor-tab .modified { color: var(--orange); }
.editor-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg1); border-bottom: 1px solid var(--border); }
.editor-toolbar .filepath { font-size: 12px; color: var(--text3); font-family: 'Consolas', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.editor-toolbar .btn { padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 11px; cursor: pointer; }
.editor-toolbar .btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.editor-toolbar .btn.save { border-color: var(--green); color: var(--green); }
.editor-toolbar .btn.save:hover { background: var(--green); color: #fff; }
.editor-textarea { flex: 1; width: 100%; padding: 12px; background: var(--bg0); color: var(--text1); border: none; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; tab-size: 4; }
.editor-welcome { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 14px; text-align: center; padding: 40px; line-height: 1.8; }
.editor-status { padding: 4px 12px; background: var(--bg1); border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); display: flex; gap: 16px; }

/* CHAT (right) */
.chat-panel { width: 360px; display: flex; flex-direction: column; flex-shrink: 0; background: var(--bg1); }
.chat-header { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.chat-header .title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.chat-header .new-btn { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--text3); padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
.chat-header .new-btn:hover { border-color: var(--accent); color: var(--accent); }
.messages { flex: 1; overflow-y: auto; padding: 12px; }
.msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
.msg.user { background: var(--accent2); color: #fff; margin-left: 40px; border-bottom-right-radius: 4px; }
.msg.assistant { background: var(--bg2); color: var(--text2); margin-right: 40px; border-bottom-left-radius: 4px; }
.msg.system { background: transparent; color: var(--text3); font-size: 11px; text-align: center; margin: 4px 0; }
.msg .time { font-size: 10px; color: var(--text3); margin-top: 3px; }
.msg.user .time { text-align: right; }
.msg.assistant .time { text-align: left; }
.msg .tool-call { margin-top: 6px; padding: 6px 8px; background: var(--bg0); border-radius: 6px; font-size: 11px; color: var(--text3); border-left: 2px solid var(--purple); }
.typing { padding: 6px 12px; color: var(--text3); font-size: 12px; display: none; }
.typing.show { display: block; }
.input-area { padding: 10px 12px; border-top: 1px solid var(--border); }
.input-row { display: flex; gap: 6px; align-items: flex-end; }
.input-row textarea { flex: 1; resize: none; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg2); color: var(--text1); font-size: 13px; font-family: inherit; line-height: 1.5; min-height: 38px; max-height: 120px; outline: none; }
.input-row textarea:focus { border-color: var(--accent); }
.input-row textarea::placeholder { color: var(--text3); }
.send-btn { padding: 8px 14px; border-radius: var(--radius); border: none; background: var(--accent2); color: #fff; font-size: 13px; cursor: pointer; height: 38px; }
.send-btn:hover { background: var(--accent); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Cowork <span>Remote</span></div>
  <div class="status-pills">
    <div class="pill"><span class="dot wait" id="dotRelay"></span><span id="lblRelay">릴레이 확인 중</span></div>
    <div class="pill"><span class="dot wait" id="dotBridge"></span><span id="lblBridge">브릿지 확인 중</span></div>
  </div>
</div>

<!-- 3-PANEL -->
<div class="panels">
  <!-- FILE EXPLORER -->
  <div class="file-panel">
    <div class="file-panel-header"><span class="title">📁 파일 탐색기</span></div>
    <div class="path-bar">
      <input id="pathInput" value="C:\Users\winspring\Desktop" onkeydown="if(event.key==='Enter')navigateTo(this.value)">
      <button onclick="navigateTo(document.getElementById('pathInput').value)" title="이동">↵</button>
      <button onclick="goUp()" title="상위 폴더">↑</button>
      <button onclick="refreshDir()" title="새로고침">↻</button>
    </div>
    <div class="file-tree" id="fileTree">
      <div class="tree-loading">브릿지 연결 대기 중...</div>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor-panel">
    <div class="editor-tabs" id="editorTabs"></div>
    <div class="editor-body">
      <div class="editor-welcome" id="editorWelcome">
        <div>
          👋 회사 PC의 파일을 여기서 편집할 수 있습니다<br><br>
          왼쪽 파일 탐색기에서 파일을 클릭하거나,<br>
          오른쪽 채팅에서 Claude에게 요청하세요
        </div>
      </div>
      <div id="editorContent" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="editor-toolbar">
          <span class="filepath" id="editorFilePath"></span>
          <span style="flex:1"></span>
          <button class="btn save" onclick="saveCurrentFile()">💾 저장</button>
          <button class="btn" onclick="reloadCurrentFile()">↻ 새로고침</button>
        </div>
        <textarea class="editor-textarea" id="editorTextarea" spellcheck="false"></textarea>
        <div class="editor-status">
          <span id="editorEncoding">UTF-8</span>
          <span id="editorSize"></span>
          <span id="editorSaveStatus"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-header">
      <span class="title">💬 Claude 채팅</span>
      <button class="new-btn" onclick="createNewChat()">+ 새 대화</button>
    </div>
    <div class="messages" id="messagesContainer"></div>
    <div class="typing" id="typingIndicator">🤖 Claude가 응답 중...</div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="msgInput" placeholder="메시지를 입력하세요..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">전송</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   CONFIG & STATE
   ═══════════════════════════════════════ */
const SUPA_URL = 'https://rnnigyfzwlgojxyccgsm.supabase.co';
const SUPA_KEY = 'sb_publishable_Nmv51BZccADB0bN5JY2URw_lLffyFgE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentPath = 'C:\\Users\\winspring\\Desktop';
let openFiles = [];       // [{path, content, modified}]
let activeFileIdx = -1;
let currentChatId = null;
let relayOnline = false;
let bridgeOnline = false;
let waitingResponse = false;
let pollTimer = null;
let realtimeChannel = null;

/* ═══════════════════════════════════════
   SUPABASE HELPERS
   ═══════════════════════════════════════ */
async function supaGet(table, query) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${query}`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
  });
  if (!r.ok) throw new Error(`GET ${table}: ${r.status}`);
  return r.json();
}
async function supaPost(table, data) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`POST ${table}: ${r.status}`);
  return r.json();
}

/* ═══════════════════════════════════════
   BRIDGE COMMAND EXECUTION
   ═══════════════════════════════════════ */
async function bridgeExec(action, content, timeout = 30000) {
  const cmdId = 'cmd-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6);
  await supaPost('commands', { id: cmdId, action, target: 'local', content, status: 'pending' });
  const deadline = Date.now() + timeout;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 800));
    const rows = await supaGet('commands', `id=eq.${cmdId}&select=status,result`);
    if (rows.length > 0) {
      if (rows[0].status === 'completed') return { ok: true, data: rows[0].result || '' };
      if (rows[0].status === 'error') return { ok: false, data: rows[0].result || 'Unknown error' };
    }
  }
  return { ok: false, data: 'Timeout' };
}

/* ═══════════════════════════════════════
   FILE EXPLORER
   ═══════════════════════════════════════ */
async function navigateTo(path) {
  path = path.trim();
  if (!path) return;
  currentPath = path;
  document.getElementById('pathInput').value = path;
  const tree = document.getElementById('fileTree');
  tree.innerHTML = '<div class="tree-loading">로딩 중...</div>';

  const ps = `Get-ChildItem -Path '${path}' -Force | Select-Object Mode, Name, Length, LastWriteTime | ConvertTo-Json -Compress`;
  const res = await bridgeExec('run_ps', ps);

  if (!res.ok) {
    tree.innerHTML = `<div class="tree-loading" style="color:var(--red)">오류: ${escHtml(res.data)}</div>`;
    return;
  }

  try {
    let items = JSON.parse(res.data);
    if (!Array.isArray(items)) items = [items];

    // 폴더 먼저, 그 다음 파일 (이름순)
    const dirs = items.filter(i => i.Mode && i.Mode.startsWith('d')).sort((a,b) => a.Name.localeCompare(b.Name));
    const files = items.filter(i => !i.Mode || !i.Mode.startsWith('d')).sort((a,b) => a.Name.localeCompare(b.Name));

    tree.innerHTML = '';
    for (const d of dirs) {
      const el = mkTreeItem('📁', d.Name, '', () => navigateTo(path + '\\' + d.Name));
      tree.appendChild(el);
    }
    for (const f of files) {
      const size = f.Length != null ? formatSize(f.Length) : '';
      const fpath = path + '\\' + f.Name;
      const el = mkTreeItem(fileIcon(f.Name), f.Name, size, () => openFile(fpath));
      tree.appendChild(el);
    }
    if (tree.children.length === 0) {
      tree.innerHTML = '<div class="tree-loading">빈 폴더</div>';
    }
  } catch (e) {
    // JSON 파싱 실패 시 텍스트로 표시
    tree.innerHTML = `<div class="tree-loading">${escHtml(res.data).slice(0, 500)}</div>`;
  }
}

function goUp() {
  const parts = currentPath.replace(/\\/g, '/').split('/');
  if (parts.length > 1) {
    parts.pop();
    navigateTo(parts.join('\\'));
  }
}

function refreshDir() { navigateTo(currentPath); }

function mkTreeItem(icon, name, size, onClick) {
  const el = document.createElement('div');
  el.className = 'tree-item';
  el.innerHTML = `<span class="icon">${icon}</span><span class="name">${escHtml(name)}</span>${size ? `<span class="size">${size}</span>` : ''}`;
  el.addEventListener('click', onClick);
  return el;
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = { txt:'📄', md:'📝', js:'🟨', py:'🐍', html:'🌐', css:'🎨', json:'📋', xml:'📋', csv:'📊', xlsx:'📊', docx:'📘', pdf:'📕', png:'🖼️', jpg:'🖼️', gif:'🖼️', bat:'⚙️', ps1:'⚙️', exe:'💠', zip:'📦' };
  return icons[ext] || '📄';
}

function formatSize(bytes) {
  if (bytes == null) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

/* ═══════════════════════════════════════
   FILE EDITOR
   ═══════════════════════════════════════ */
async function openFile(path) {
  // 이미 열린 파일이면 탭 전환
  const idx = openFiles.findIndex(f => f.path === path);
  if (idx >= 0) { activateTab(idx); return; }

  // 파일 읽기
  const ps = `Get-Content -Path '${path}' -Raw -Encoding UTF8`;
  const res = await bridgeExec('run_ps', ps);

  if (!res.ok) {
    alert('파일을 열 수 없습니다: ' + res.data);
    return;
  }

  openFiles.push({ path, content: res.data, original: res.data, modified: false });
  activateTab(openFiles.length - 1);
}

function activateTab(idx) {
  // 현재 편집 내용 저장
  if (activeFileIdx >= 0 && activeFileIdx < openFiles.length) {
    const ta = document.getElementById('editorTextarea');
    openFiles[activeFileIdx].content = ta.value;
    openFiles[activeFileIdx].modified = (ta.value !== openFiles[activeFileIdx].original);
  }

  activeFileIdx = idx;
  renderTabs();

  if (idx < 0 || idx >= openFiles.length) {
    document.getElementById('editorWelcome').style.display = 'flex';
    document.getElementById('editorContent').style.display = 'none';
    return;
  }

  document.getElementById('editorWelcome').style.display = 'none';
  document.getElementById('editorContent').style.display = 'flex';

  const file = openFiles[idx];
  document.getElementById('editorFilePath').textContent = file.path;
  document.getElementById('editorTextarea').value = file.content;
  document.getElementById('editorSize').textContent = new Blob([file.content]).size + ' bytes';
  document.getElementById('editorSaveStatus').textContent = file.modified ? '● 수정됨' : '✓ 저장됨';
  document.getElementById('editorSaveStatus').style.color = file.modified ? 'var(--orange)' : 'var(--green)';
}

function renderTabs() {
  const el = document.getElementById('editorTabs');
  el.innerHTML = openFiles.map((f, i) => {
    const name = f.path.split('\\').pop();
    const active = i === activeFileIdx;
    const mod = f.modified ? '<span class="modified">●</span>' : '';
    return `<div class="editor-tab ${active ? 'active' : ''}" onclick="activateTab(${i})">${mod}${escHtml(name)}<span class="close" onclick="event.stopPropagation();closeTab(${i})">×</span></div>`;
  }).join('');
}

function closeTab(idx) {
  if (openFiles[idx].modified && !confirm('저장하지 않은 변경사항이 있습니다. 닫으시겠습니까?')) return;
  openFiles.splice(idx, 1);
  if (activeFileIdx >= openFiles.length) activeFileIdx = openFiles.length - 1;
  if (activeFileIdx < 0) activeFileIdx = -1;
  activateTab(activeFileIdx);
}

async function saveCurrentFile() {
  if (activeFileIdx < 0) return;
  const file = openFiles[activeFileIdx];
  const ta = document.getElementById('editorTextarea');
  file.content = ta.value;

  const statusEl = document.getElementById('editorSaveStatus');
  statusEl.textContent = '저장 중...';
  statusEl.style.color = 'var(--orange)';

  const res = await bridgeExec('write_file', JSON.stringify({ path: file.path, content: file.content }));

  if (res.ok) {
    file.original = file.content;
    file.modified = false;
    statusEl.textContent = '✓ 저장 완료';
    statusEl.style.color = 'var(--green)';
    renderTabs();
  } else {
    statusEl.textContent = '저장 실패: ' + res.data;
    statusEl.style.color = 'var(--red)';
  }
}

async function reloadCurrentFile() {
  if (activeFileIdx < 0) return;
  const file = openFiles[activeFileIdx];
  const ps = `Get-Content -Path '${file.path}' -Raw -Encoding UTF8`;
  const res = await bridgeExec('run_ps', ps);
  if (res.ok) {
    file.content = res.data;
    file.original = res.data;
    file.modified = false;
    activateTab(activeFileIdx);
  }
}

// 에디터 수정 감지
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('editorTextarea').addEventListener('input', () => {
    if (activeFileIdx < 0) return;
    const file = openFiles[activeFileIdx];
    file.content = document.getElementById('editorTextarea').value;
    file.modified = (file.content !== file.original);
    document.getElementById('editorSaveStatus').textContent = file.modified ? '● 수정됨' : '✓ 저장됨';
    document.getElementById('editorSaveStatus').style.color = file.modified ? 'var(--orange)' : 'var(--green)';
    renderTabs();
  });
});

/* Ctrl+S 저장 단축키 */
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveCurrentFile();
  }
});

/* ═══════════════════════════════════════
   CHAT
   ═══════════════════════════════════════ */
async function createNewChat() {
  currentChatId = 'chat-' + Math.random().toString(36).slice(2, 10);
  document.getElementById('messagesContainer').innerHTML = '';
  setWaiting(false);
  setupRealtime();
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  if (!relayOnline) { alert('릴레이가 오프라인입니다.'); return; }

  input.value = '';
  autoResize();

  const msgId = 'u-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6);
  appendMsg({ id: msgId, role: 'user', content: text, created_at: new Date().toISOString() });
  scrollBottom();
  setWaiting(true);

  try {
    await supaPost('messages', { id: msgId, chat_id: currentChatId, role: 'user', content: text, status: 'pending' });
    startPolling(2000);
  } catch (e) {
    appendMsg({ id: 'err-' + Date.now(), role: 'system', content: '전송 실패: ' + e.message });
    setWaiting(false);
  }
}

function appendMsg(msg) {
  const container = document.getElementById('messagesContainer');
  let el = document.getElementById('msg-' + msg.id);
  if (el) { el.querySelector('.mc').textContent = msg.content || ''; return; }
  el = document.createElement('div');
  el.id = 'msg-' + msg.id;
  el.className = `msg ${msg.role || 'system'}`;
  const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }) : '';
  el.innerHTML = `<div class="mc">${escHtml(msg.content || '')}</div><div class="time">${time}</div>`;
  container.appendChild(el);
}

function scrollBottom() {
  const c = document.getElementById('messagesContainer');
  c.scrollTop = c.scrollHeight;
}

function setWaiting(on) {
  waitingResponse = on;
  document.getElementById('typingIndicator').classList.toggle('show', on);
  document.getElementById('sendBtn').disabled = on;
}

/* POLLING */
function startPolling(interval = 5000) {
  stopPolling();
  pollMessages();
  pollTimer = setInterval(pollMessages, interval);
}
function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

async function pollMessages() {
  if (!currentChatId) return;
  try {
    const msgs = await supaGet('messages', `chat_id=eq.${currentChatId}&order=created_at.asc&select=id,role,content,status,created_at`);
    let hasNew = false;
    for (const m of msgs) {
      const ex = document.getElementById('msg-' + m.id);
      if (ex) {
        const mc = ex.querySelector('.mc');
        if (mc && mc.textContent !== (m.content || '')) { mc.textContent = m.content || ''; scrollBottom(); }
      } else {
        appendMsg(m);
        if (m.role === 'assistant') hasNew = true;
      }
    }
    if (hasNew) {
      scrollBottom();
      const last = [...msgs].reverse().find(m => m.role === 'assistant');
      if (last && (last.status === 'completed' || last.status === 'error')) {
        setWaiting(false);
        startPolling(5000);
      }
    }
  } catch (e) { console.error('poll error:', e); }
}

/* REALTIME */
function setupRealtime() {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  if (!currentChatId) return;
  realtimeChannel = sb.channel('msg-' + currentChatId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: `chat_id=eq.${currentChatId}` }, (payload) => {
      const m = payload.new;
      if (!m) return;
      const ex = document.getElementById('msg-' + m.id);
      if (ex) { const mc = ex.querySelector('.mc'); if (mc) mc.textContent = m.content || ''; }
      else appendMsg(m);
      scrollBottom();
      if (m.role === 'assistant' && (m.status === 'completed' || m.status === 'error')) setWaiting(false);
    })
    .subscribe();
}

/* ═══════════════════════════════════════
   HEARTBEATS
   ═══════════════════════════════════════ */
async function checkRelay() {
  try {
    const rows = await supaGet('commands', 'id=eq.relay-heartbeat&select=result,content');
    if (rows.length > 0 && rows[0].result) {
      const ago = Math.floor((Date.now() - new Date(rows[0].result).getTime()) / 1000);
      if (ago < 90) {
        relayOnline = true;
        const s = rows[0].content === 'busy' ? '처리 중' : '대기 중';
        setStatus('Relay', 'on', `릴레이 (${s})`);
      } else { relayOnline = false; setStatus('Relay', 'off', '릴레이 오프라인'); }
    } else { relayOnline = false; setStatus('Relay', 'off', '릴레이 미연결'); }
  } catch { setStatus('Relay', 'off', '체크 실패'); }
}

async function checkBridge() {
  try {
    const rows = await supaGet('commands', 'id=eq.bridge-heartbeat&select=result');
    if (rows.length > 0 && rows[0].result) {
      const ago = Math.floor((Date.now() - new Date(rows[0].result).getTime()) / 1000);
      if (ago < 120) { bridgeOnline = true; setStatus('Bridge', 'on', '브릿지 연결됨'); if (!document.getElementById('fileTree').querySelector('.tree-item')) refreshDir(); }
      else { bridgeOnline = false; setStatus('Bridge', 'off', '브릿지 오프라인'); }
    } else { bridgeOnline = false; setStatus('Bridge', 'wait', '브릿지 대기 중'); }
  } catch { setStatus('Bridge', 'off', '체크 실패'); }
}

function setStatus(which, state, text) {
  document.getElementById('dot' + which).className = 'dot ' + state;
  document.getElementById('lbl' + which).textContent = text;
}

/* ═══════════════════════════════════════
   INPUT HANDLING
   ═══════════════════════════════════════ */
function setupInput() {
  const input = document.getElementById('msgInput');
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (e.isComposing) return;
      sendMessage();
    }
  });
  input.addEventListener('input', autoResize);
}

function autoResize() {
  const input = document.getElementById('msgInput');
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', async () => {
  setupInput();
  createNewChat();
  await Promise.all([checkRelay(), checkBridge()]);
  setInterval(checkRelay, 15000);
  setInterval(checkBridge, 30000);
});
</script>
