<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowork Remote</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg0: #1a1a1a;
  --bg1: #1f1f1f;
  --bg2: #262626;
  --bg3: #303030;
  --bg4: #3a3a3a;
  --text1: #f0f0ef;
  --text2: #b0afa8;
  --text3: #6b6b6b;
  --accent: #d97706;
  --accent2: #b45309;
  --blue: #2563eb;
  --blue2: #1d4ed8;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --border: #2a2a2a;
  --sidebar-w: 210px;
  --right-w: 272px;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg0);
  color: var(--text1);
  display: flex;
  height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ─────────────────────────────────────────
   LEFT SIDEBAR
───────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 14px 12px 10px;
  flex-shrink: 0;
}
.logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--text1);
  margin-bottom: 11px;
  letter-spacing: -.2px;
  user-select: none;
}
.logo em { color: var(--accent); font-style: normal; }

.new-chat-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 12.5px;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.new-chat-btn:hover {
  background: var(--bg4);
  color: var(--text1);
  border-color: rgba(217,119,6,.5);
}
.new-chat-btn svg { width: 13px; height: 13px; stroke: currentColor; flex-shrink: 0; }

.search-wrap {
  padding: 6px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 9px;
  border-radius: 6px;
  font-size: 12px;
  outline: none;
  font-family: inherit;
}
.search-input:focus { border-color: rgba(217,119,6,.6); }
.search-input::placeholder { color: var(--text3); }

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0 6px;
}
.chat-list::-webkit-scrollbar { width: 3px; }
.chat-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

.cl-section-label {
  padding: 8px 14px 3px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .6px;
}
.cl-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 10px;
  margin: 1px 5px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text2);
  font-size: 12.5px;
  transition: background .12s;
  overflow: hidden;
}
.cl-item:hover { background: var(--bg2); color: var(--text1); }
.cl-item.active { background: rgba(217,119,6,.12); color: var(--accent); }
.cl-item-icon { font-size: 12px; flex-shrink: 0; }
.cl-item-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cl-item-time { font-size: 10px; color: var(--text3); flex-shrink: 0; }
.cl-empty { padding: 14px 14px; font-size: 12px; color: var(--text3); }

.sidebar-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.status-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text3);
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.dot.on  { background: var(--green); box-shadow: 0 0 5px rgba(34,197,94,.6); }
.dot.off { background: var(--red); }
.dot.wait { background: var(--orange); animation: blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ─────────────────────────────────────────
   CENTER CHAT
───────────────────────────────────────── */
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg0);
}

.chat-topbar {
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-topbar-title {
  flex: 1;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.model-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text3);
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 3px 9px;
  border-radius: 12px;
  flex-shrink: 0;
  cursor: default;
}
.model-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* Messages scroll area */
.messages-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
}
.messages-wrap::-webkit-scrollbar { width: 5px; }
.messages-wrap::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

/* Welcome */
.chat-welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--text3);
  padding: 40px;
  text-align: center;
}
.claude-circle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #d97706, #ea580c);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: #fff;
  font-weight: 800;
  flex-shrink: 0;
  margin-bottom: 2px;
}
.chat-welcome h2 { font-size: 18px; font-weight: 500; color: var(--text2); }
.chat-welcome p { font-size: 13px; color: var(--text3); line-height: 1.75; max-width: 340px; }
.chat-welcome .hint {
  font-size: 12px;
  color: var(--text3);
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: 20px;
  margin-top: 4px;
}

/* Messages */
.messages {
  flex: 1;
  padding: 18px 16px 10px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.msg-group {
  max-width: 720px;
  width: 100%;
  align-self: center;
  display: flex;
  flex-direction: column;
  margin-bottom: 10px;
}
.msg-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.msg-row.user-row  { flex-direction: row-reverse; }
.msg-av {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  margin-top: 2px;
}
.msg-av.user-av  { background: var(--blue);   color: #fff; }
.msg-av.ai-av    { background: linear-gradient(135deg,#d97706,#ea580c); color: #fff; }
.msg-bubble {
  max-width: calc(100% - 42px);
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.65;
  word-break: break-word;
  white-space: pre-wrap;
}
.user-row .msg-bubble {
  background: var(--blue);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.ai-row .msg-bubble {
  background: var(--bg2);
  color: var(--text1);
  border-bottom-left-radius: 4px;
}
.sys-row .msg-bubble {
  background: transparent;
  color: var(--text3);
  font-size: 11.5px;
  text-align: center;
  padding: 2px 8px;
}
.msg-time {
  font-size: 10px;
  color: var(--text3);
  padding: 2px 4px;
  margin-top: 2px;
}
.user-row + .msg-time { text-align: right; }

/* Attachments in messages */
.msg-img { max-width: 220px; border-radius: 8px; display: block; margin-bottom: 6px; cursor: zoom-in; }
.msg-file-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,.1);
  margin-bottom: 6px;
  font-size: 12px;
}

/* Typing indicator */
.typing-wrap {
  padding: 4px 16px 4px;
  display: none;
  align-items: center;
  gap: 8px;
  color: var(--text3);
  font-size: 12px;
  max-width: 720px;
  width: 100%;
  align-self: center;
  flex-shrink: 0;
}
.typing-wrap.show { display: flex; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text3);
  animation: tdot .9s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay:.15s; }
.typing-dots span:nth-child(3) { animation-delay:.3s; }
@keyframes tdot { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

/* Input area */
.input-area {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.attach-preview {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.attach-preview:empty { display: none; }
.aprev { position: relative; display: inline-flex; align-items: center; }
.aprev img { height: 52px; width: 52px; object-fit: cover; border-radius: 8px; }
.fchip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--text2);
}
.fn { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.xbtn {
  position: absolute;
  top: -6px; right: -6px;
  width: 16px; height: 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);
  border-radius: 50%;
  font-size: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.xbtn:hover { background: var(--red); color: #fff; border-color: var(--red); }

.input-box {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  transition: border-color .2s;
}
.input-box:focus-within { border-color: rgba(217,119,6,.5); }
.input-left { display: flex; gap: 2px; flex-shrink: 0; }
.iact {
  background: none; border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 4px 5px;
  border-radius: 5px;
  font-size: 15px;
  line-height: 1;
  transition: all .12s;
}
.iact:hover { background: var(--bg3); color: var(--text1); }
.msg-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text1);
  font-size: 13.5px;
  line-height: 1.55;
  resize: none;
  outline: none;
  min-height: 22px;
  max-height: 120px;
  font-family: inherit;
}
.msg-input::placeholder { color: var(--text3); }
.send-btn {
  width: 32px; height: 32px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.send-btn:hover { background: var(--accent2); }
.send-btn:disabled { background: var(--bg3); cursor: not-allowed; opacity: .5; }
.send-btn svg { width: 16px; height: 16px; fill: #fff; }

/* ─────────────────────────────────────────
   RIGHT PANEL
───────────────────────────────────────── */
.right-panel {
  width: var(--right-w);
  background: var(--bg1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.rp-top {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.rp-top-title { font-size: 12.5px; font-weight: 600; color: var(--text2); flex: 1; }
.rp-badge {
  font-size: 10.5px;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 7px;
  border-radius: 10px;
}
.rp-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.rp-scroll::-webkit-scrollbar { width: 3px; }
.rp-scroll::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

.rp-sec { padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 0; }
.rp-sec:last-child { border-bottom: none; }
.rp-sec-title {
  padding: 8px 14px 4px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* Steps */
.step-list { padding: 0 10px; display: flex; flex-direction: column; gap: 1px; }
.step-item {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 3px 5px;
  border-radius: 5px;
  font-size: 11.5px;
  color: var(--text3);
  line-height: 1.4;
  transition: background .1s;
}
.step-item.active { color: var(--text1); background: rgba(255,255,255,.04); }
.step-icon { flex-shrink: 0; width: 14px; text-align: center; margin-top: 1px; font-size: 11px; }
.step-text { flex: 1; word-break: break-all; }
.step-empty { padding: 6px 14px; font-size: 11.5px; color: var(--text3); }

/* Project */
.rp-project {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 6px 10px;
  margin: 2px 5px;
  border-radius: 7px;
  cursor: default;
}
.rp-project:hover { background: var(--bg2); }
.proj-ico {
  width: 30px; height: 30px;
  background: var(--bg3);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.proj-name { font-size: 12.5px; font-weight: 500; color: var(--text1); }
.proj-sub  { font-size: 11px; color: var(--text3); }

/* Files */
.file-list { padding: 2px 8px; display: flex; flex-direction: column; gap: 1px; }
.rp-file {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 7px;
  border-radius: 6px;
  cursor: default;
  color: var(--text2);
  font-size: 12px;
  transition: background .1s;
}
.rp-file:hover { background: var(--bg2); }
.rp-file-ico { font-size: 13px; flex-shrink: 0; }
.rp-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rp-file-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 4px;
  background: rgba(34,197,94,.12);
  color: var(--green);
  flex-shrink: 0;
}

/* Connectors */
.conn-list { padding: 4px 12px; display: flex; flex-direction: column; gap: 5px; }
.conn-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 7px;
  font-size: 12px;
  color: var(--text2);
}
.conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.conn-dot.on   { background: var(--green); box-shadow: 0 0 4px rgba(34,197,94,.5); }
.conn-dot.off  { background: var(--red); }
.conn-dot.wait { background: var(--orange); animation: blink 1.5s ease-in-out infinite; }
.conn-name { flex: 1; }
.conn-status { font-size: 10.5px; color: var(--text3); }

/* ─────────────────────────────────────────
   OVERLAYS
───────────────────────────────────────── */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.85); z-index: 1000;
  align-items: center; justify-content: center;
}
.lightbox.show { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; cursor: zoom-out; }

.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text1); padding: 8px 18px;
  border-radius: 20px; font-size: 12.5px;
  opacity: 0; pointer-events: none;
  transition: all .25s; white-space: nowrap; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════
     LEFT SIDEBAR
═══════════════════════════════ -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">Cowork <em>Remote</em></div>
    <button class="new-chat-btn" onclick="createNewChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      새 대화
    </button>
  </div>

  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="대화 검색..."
           id="chatSearch" oninput="filterChats(this.value)">
  </div>

  <div class="chat-list" id="chatList">
    <div class="cl-section-label">최근 대화</div>
  </div>

  <div class="sidebar-footer">
    <div class="status-row">
      <div class="dot wait" id="dotRelay"></div>
      <span id="lblRelay">릴레이 확인 중...</span>
    </div>
    <div class="status-row">
      <div class="dot wait" id="dotBridge"></div>
      <span id="lblBridge">브릿지 확인 중...</span>
    </div>
  </div>
</aside>

<!-- ═══════════════════════════════
     CENTER CHAT
═══════════════════════════════ -->
<main class="chat-main">
  <div class="chat-topbar">
    <div class="chat-topbar-title" id="chatTitle">새 대화</div>
    <div class="model-chip">
      <div class="model-dot"></div>
      Claude Sonnet
    </div>
  </div>

  <div class="messages-wrap" id="messagesWrap">
    <!-- Welcome state -->
    <div class="chat-welcome" id="chatWelcome">
      <div class="claude-circle">C</div>
      <h2>안녕하세요!</h2>
      <p>회사 PC와 연결하여 파일 작업, RPA 자동화,<br>문서 편집 등을 처리할 수 있습니다.</p>
      <div class="hint">💡 메시지 입력 또는 파일을 첨부하세요</div>
    </div>

    <!-- Active messages -->
    <div class="messages" id="msgContainer" style="display:none"></div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-wrap" id="typingWrap">
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span>Claude가 응답 중...</span>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="attach-preview" id="attachRow"></div>
    <div class="input-box">
      <div class="input-left">
        <button class="iact" title="파일 첨부" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="iact" title="스크린샷 요청" onclick="requestScreenshot()">🖼️</button>
        <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileInput(this)">
      </div>
      <textarea
        class="msg-input"
        id="msgInput"
        placeholder="메시지를 입력하세요... (Shift+Enter로 줄바꿈)"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</main>

<!-- ═══════════════════════════════
     RIGHT PANEL
═══════════════════════════════ -->
<aside class="right-panel">
  <div class="rp-top">
    <div class="rp-top-title">진행 상황</div>
    <div class="rp-badge" id="rpBadge">—</div>
  </div>
  <div class="rp-scroll">

    <!-- Steps -->
    <div class="rp-sec">
      <div class="rp-sec-title">작업 단계</div>
      <div class="step-list" id="rpStepList">

<script>
/* ════════════════════════════════════════

const SUPA_URL = 'https://rnnigyfzwlgojxyccgsm.supabase.co';
const SUPA_KEY = 'sb_publishable_Nmv51BZccADB0bN5JY2URw_lLffyFgE';

let chatId      = null;

/* ════════════════════════════════════════
   SUPABASE REST HELPERS
════════════════════════════════════════ */
async function sgRaw(table, qs) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${qs}`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sp(table, data) {
  const r = await sb.from(table).upsert(data);
  if (r.error) throw r.error;
  return r.data;
}
async function bridgeExec(action, content, timeout = 30000) {
  const id = 'cmd-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  await sp('commands', { id, action, target: '', content, status: 'pending' });
  const deadline = Date.now() + timeout;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 1500));
    const rows = await sgRaw('commands', `id=eq.${id}&select=status,result`);
    if (rows.length && (rows[0].status === 'completed' || rows[0].status === 'error')) {
      sb.from('commands').delete().eq('id', id).then(() => {});
      return { ok: rows[0].status === 'completed', data: rows[0].result || '' };
    }
  }
  return { ok: false, data: '(timeout)' };
}

/* ════════════════════════════════════════
   CHAT HISTORY  (localStorage)
════════════════════════════════════════ */
function loadHistory() {
  try { chatHistory = JSON.parse(localStorage.getItem('cwHistory') || '[]'); }
  catch(e) { chatHistory = []; }
  renderChatList();
}
function upsertHistory(id, title) {
  const i = chatHistory.findIndex(c => c.id === id);
  if (i >= 0) { chatHistory[i].title = title; chatHistory[i].updated = Date.now(); }
  else chatHistory.unshift({ id, title, updated: Date.now() });
  if (chatHistory.length > 60) chatHistory.length = 60;
  localStorage.setItem('cwHistory', JSON.stringify(chatHistory));
  renderChatList();
}
function renderChatList(filter = '') {
  const list = document.getElementById('chatList');
  const label = list.querySelector('.cl-section-label');
  list.innerHTML = '';
  if (label) list.appendChild(label);

  const items = filter
    ? chatHistory.filter(c => c.title.toLowerCase().includes(filter.toLowerCase()))
    : chatHistory;

  if (!items.length) {
    const d = document.createElement('div');
    d.className = 'cl-empty';
    d.textContent = filter ? '검색 결과 없음' : '대화 기록이 없습니다';
    list.appendChild(d); return;
  }
  items.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cl-item' + (c.id === chatId ? ' active' : '');
    d.innerHTML = `<span class="cl-item-icon">💬</span><span class="cl-item-title">${esc(c.title)}</span><span class="cl-item-time">${relTime(c.updated)}</span>`;
    d.onclick = () => loadChat(c.id, c.title);
    list.appendChild(d);
  });
}
function filterChats(v) { renderChatList(v); }
function relTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return '방금';
  if (d < 3600000) return Math.floor(d/60000) + '분';
  if (d < 86400000) return Math.floor(d/3600000) + '시간';
  return Math.floor(d/86400000) + '일';
}

/* ════════════════════════════════════════
   CHAT SWITCHING
════════════════════════════════════════ */
async function loadChat(id, title) {
  chatId = id;
  document.getElementById('chatTitle').textContent = title || id;
  document.getElementById('chatWelcome').style.display = 'none';
  document.getElementById('msgContainer').style.display = 'flex';

    const msgs = await sgRaw('messages',
      `chat_id=eq.${id}&order=created_at.asc&select=id,role,content,status,created_at`);

    scrollBot();

  startPolling(5000);
}

/* ════════════════════════════════════════

════════════════════════════════════════ */

/* ════════════════════════════════════════
   SEND MESSAGE
════════════════════════════════════════ */
async function sendMessage() {
  const inp  = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text && !attachments.length) return;
  if (!chatId) return;
  if (!relayOnline) { toast('릴레이가 오프라인입니다'); return; }
  // Guard: block send while file extraction is still pending
  if (attachments.some(a => a.data === '[추출 중...]')) {
    toast('⏳ 파일 추출 중입니다. 잠시 후 전송해주세요.');
    return;
  }
  // Guard: block send if extraction failed completely  
  if (attachments.some(a => a.type === 'file' && a.data.startsWith('[파일 읽기 실패'))) {
    const proceed = confirm('파일 추출에 실패했습니다. 파일 내용 없이 전송하시겠습니까?');
    if (!proceed) return;
  }

  /* Build full content */
  let full = text;
  const imgs  = attachments.filter(a => a.type === 'image');
  const files = attachments.filter(a => a.type === 'file');
  if (imgs.length)  full += '\n\n[첨부 이미지 ' + imgs.length + '개: ' + imgs.map(a=>a.name).join(', ') + ']';
  if (files.length) full += '\n\n[첨부 파일]\n' + files.map(a=>`파일명: ${a.name}\n${a.data}`).join('\n\n---\n\n');

  const msgId = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);

  /* Optimistic UI */
  appendMsg({ id: msgId, role:'user', content:text,
    attachments: imgs.map(a=>({type:'image',name:a.name,data:a.data})) });

  document.getElementById('chatWelcome').style.display = 'none';
  document.getElementById('msgContainer').style.display = 'flex';

  const title = text.slice(0,30) + (text.length>30?'...':'') || '[파일 첨부]';
  upsertHistory(chatId, title);
  document.getElementById('chatTitle').textContent = title;

  inp.value = ''; autoResize();
  const savedAttachments = [...attachments];
  attachments = []; renderAttachRow();
  setWaiting(true); resetProgress();
  scrollBot();

  try {
    const _md={id:msgId,chat_id:chatId,role:'user',content:full,status:'pending'};
    if(imgs.length>0)_md.attachments=imgs.map(a=>({type:'image',name:a.name,data:a.data}));
    await sp('messages',_md);
    startPolling(2000);
  } catch(e) {
    toast('전송 실패: ' + e.message);
    setWaiting(false);
  }
}

/* ════════════════════════════════════════
   FILE ATTACH & IMAGE PASTE
════════════════════════════════════════ */
async function handleFileInput(input) {
  const OFFICE = ['docx','doc','xlsx','xls','pptx','ppt','hwp','hwpx','pdf'];
  const IMGS   = ['png','jpg','jpeg','gif','webp','bmp'];
  for (const f of input.files) {
    const ext = f.name.split('.').pop().toLowerCase();
    if (f.type.startsWith('image/') || IMGS.includes(ext)) {
      attachments.push({ type:'image', name:f.name, data: await readDataURL(f) });
    } else if (OFFICE.includes(ext)) {
      attachments.push({ type:'file', name:f.name, data:'[추출 중...]' });
      const idx = attachments.length - 1;
      renderAttachRow();
      try {
        attachments[idx].data = await extractViaLocalBridge(f);
      } catch(e) {
        attachments[idx].data = '[파일 읽기 실패 – bridge-agent(포트 7654) 확인]\n' + e.message;
        toast('⚠️ ' + f.name + ': 브릿지 에이전트 연결 실패');
      }
    } else {
      try { attachments.push({ type:'file', name:f.name, data: await readText(f) }); }
      catch { toast('파일 읽기 실패: ' + f.name); }
    }
    renderAttachRow();
  }
  input.value = '';
}

async function extractViaLocalBridge(file) {
  const ab = await file.arrayBuffer();
  const u8 = new Uint8Array(ab);
  let bin = '';
  for (let i = 0; i < u8.length; i += 8192) {
    bin += String.fromCharCode(...u8.subarray(i, Math.min(i + 8192, u8.length)));
  }
  const resp = await fetch('http://localhost:7654/extract', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: file.name, data: btoa(bin) }),
    signal: AbortSignal.timeout(10000)
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const json = await resp.json();
  if (json.error) throw new Error(json.error);
  return json.text;
}
function readDataURL(f) { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(f); }); }
function readText(f)    { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsText(f,'UTF-8'); }); }

document.addEventListener('paste', async e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const data = await readDataURL(item.getAsFile());
      attachments.push({ type:'image', name:'paste-'+Date.now()+'.png', data });
      renderAttachRow(); break;
    }
  }
});

function renderAttachRow() {
  document.getElementById('attachRow').innerHTML = attachments.map((a,i) =>
    a.type==='image'
      ? `<div class="aprev"><img src="${a.data}" onclick="lightbox('${a.data}')"><button class="xbtn" onclick="rmAttach(${i})">×</button></div>`
      : `<div class="aprev"><div class="fchip">📄<span class="fn">${esc(a.name)}</span></div><button class="xbtn" onclick="rmAttach(${i})">×</button></div>`
  ).join('');
}
function rmAttach(i) { attachments.splice(i,1); renderAttachRow(); }

async function requestScreenshot() {

  toast('스크린샷 캡처 중...');

    [Convert]::ToBase64String([IO.File]::ReadAllBytes($path))

/* ════════════════════════════════════════
   MESSAGE RENDERING
════════════════════════════════════════ */
function appendMsg(msg) {
  const container = document.getElementById('msgContainer');
  let grp = document.getElementById('m-' + msg.id);
  if (grp) {
    const mc = grp.querySelector('.mc');
    if (mc) mc.textContent = parseContent(msg.content || '');
    updateProgress(msg); return;
  }

  const time = msg.created_at
    ? new Date(msg.created_at).toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' })
    : '';

  grp = document.createElement('div');
  grp.id   = 'm-' + msg.id;
  grp.className = 'msg-group';

  if (msg.role === 'system') {
    grp.innerHTML = `<div class="msg-row sys-row"><div class="msg-bubble">${esc(msg.content||'')}</div></div>`;
  } else {
    const isUser = msg.role === 'user';
    const rowCls = isUser ? 'user-row' : 'ai-row';
    const avCls  = isUser ? 'user-av'  : 'ai-av';
    const avTxt  = isUser ? '나'        : 'C';

    let att = '';
    (msg.attachments || []).forEach(a => {
      if (a.type==='image') att += `<img class="msg-img" src="${a.data}" onclick="lightbox('${a.data}')">`;
      else                  att += `<div class="msg-file-chip">📄 ${esc(a.name)}</div>`;
    });

    const content = parseContent(msg.content || '');
    grp.innerHTML = `
      <div class="msg-row ${rowCls}">
        <div class="msg-av ${avCls}">${avTxt}</div>
        <div class="msg-bubble">${att}<div class="mc">${esc(content)}</div></div>
      </div>
      ${time ? `<div class="msg-time">${time}</div>` : ''}
    `;
    updateProgress(msg);
    if (!isUser) findFilesInText(content);
  }
  container.appendChild(grp);
}

function parseContent(raw) {
  if (!raw) return '';
  const t = raw.trim();
  if (t.startsWith('{')) {
    try {
      const p = JSON.parse(t);
      if (p.text)    return p.text;
      if (p.content) return p.content;
      if (p.error)   return '⚠️ ' + p.error;
    } catch(e) {}
  }
  return raw;
}

/* ════════════════════════════════════════
   RIGHT PANEL — PROGRESS
════════════════════════════════════════ */
function resetProgress() {
  document.getElementById('rpBadge').textContent = '—';
  document.getElementById('rpStepList').innerHTML = '<div class="step-empty">작업이 시작되면 단계별 진행이 표시됩니다.</div>';
  document.getElementById('rpFileSec').style.display = 'none';
  document.getElementById('rpFileList').innerHTML = '';
}

function updateProgress(msg) {
  if (!msg.content) return;
  let p = null;
  try { const t=(msg.content||'').trim(); if(t.startsWith('{')) p=JSON.parse(t); } catch(e){}
  if (!p) return;

  if (p.steps && p.steps.length) renderSteps(p.steps, p.step);
  if (p.tools) p.tools.forEach(t => { if(t.target&&t.target.includes('\\')) addFile(t.target); });
}

function renderSteps(steps, active) {
  document.getElementById('rpBadge').textContent = steps.length + '단계';
  const ICONS = {'✅':'✅','❌':'❌','🧠':'🧠','⚡':'⚡','🔧':'🔧','🔄':'🔄','📝':'📝','💬':'💬','🔌':'🔌','⚠️':'⚠️'};
  document.getElementById('rpStepList').innerHTML = steps.slice(-18).map(s => {
    const firstChar = [...s][0];
    const icon = ICONS[firstChar] || '▸';
    const text = s.replace(/^[\u2705\u274C\u{1F9E0}\u26A1\u{1F527}\u{1F504}\u{1F4DD}\u{1F4AC}\u{1F50C}\u26A0]\s*/u,'').replace(/^▸\s*/,'');
    const isActive = s === active;
    return `<div class="step-item${isActive?' active':''}">
      <span class="step-icon">${icon}</span>
      <span class="step-text">${esc(text||s)}</span>
    </div>`;
  }).join('');
}

function findFilesInText(text) {
  const rx = /([A-Z]:\\[^\s\n"'<>]+\.[a-zA-Z0-9]{2,6})/g;
  let m; while((m=rx.exec(text))!==null) addFile(m[1]);
}

function addFile(path) {
  const sec  = document.getElementById('rpFileSec');
  const list = document.getElementById('rpFileList');
  sec.style.display = '';
  const name = path.split('\\').pop();
  if ([...list.querySelectorAll('.rp-file-name')].some(el=>el.textContent===name)) return;
  const ext  = name.split('.').pop().toLowerCase();
  const ico  = {'docx':'📝','doc':'📝','xlsx':'📊','xls':'📊','pptx':'📑','ppt':'📑',
                'pdf':'📕','png':'🖼️','jpg':'🖼️','jpeg':'🖼️','js':'⚙️','ts':'⚙️',
                'bat':'⚡','ps1':'⚡','hwp':'📋','hwpx':'📋'}[ext] || '📄';
  const d = document.createElement('div');
  d.className = 'rp-file';
  d.innerHTML = `<span class="rp-file-ico">${ico}</span><span class="rp-file-name" title="${esc(path)}">${esc(name)}</span><span class="rp-file-badge">생성됨</span>`;
  list.appendChild(d);
}

/* ════════════════════════════════════════
   POLLING & REALTIME
════════════════════════════════════════ */
function startPolling(iv=5000){ stopPolling(); pollMessages(); pollTimer=setInterval(pollMessages,iv); }
function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

async function pollMessages() {
  if (!chatId) return;
  try {
    const msgs = await sgRaw('messages',
      `chat_id=eq.${chatId}&order=created_at.asc&select=id,role,content,status,created_at`);
    let hasNew = false;
    msgs.forEach(m => {
      const ex = document.getElementById('m-'+m.id);
      if (ex) {
        const mc = ex.querySelector('.mc');
        const parsed = parseContent(m.content||'');
        if (mc && mc.textContent !== parsed) { mc.textContent = parsed; scrollBot(); }
        updateProgress(m);
      } else {
        appendMsg(m);
        if (m.role==='assistant') hasNew = true;
      }
    });
    if (hasNew) {
      scrollBot();
      const last = [...msgs].reverse().find(m=>m.role==='assistant');
      if (last && (last.status==='completed'||last.status==='error')) {
        setWaiting(false); startPolling(5000);
      }
    }
  } catch(e) { console.error('poll:', e); }
}

function setupRealtime() {
  if (rtChannel) sb.removeChannel(rtChannel);
  if (!chatId) return;
  rtChannel = sb.channel('rt-'+chatId)
    .on('postgres_changes',
      { event:'*', schema:'public', table:'messages', filter:`chat_id=eq.${chatId}` },
      payload => {
        const m = payload.new; if (!m) return;
        const ex = document.getElementById('m-'+m.id);
        const parsed = parseContent(m.content||'');
        if (ex) { const mc=ex.querySelector('.mc'); if(mc) mc.textContent=parsed; updateProgress(m); }
        else appendMsg(m);
        scrollBot();
        if (m.role==='assistant' && (m.status==='completed'||m.status==='error')) setWaiting(false);
      })
    .subscribe();
}

/* ════════════════════════════════════════
   STATUS CHECKS
════════════════════════════════════════ */
async function checkRelay() {
  try {
    const rows = await sgRaw('commands', 'id=eq.relay-heartbeat&select=result,content');
    if (rows.length && rows[0].result) {
      const ago = Math.floor((Date.now()-new Date(rows[0].result).getTime())/1000);
      if (ago < 90) {
        relayOnline = true;
        const busy = rows[0].content === 'busy';
        setStatus('Relay','on', busy?'처리 중':'온라인');
        return;
      }
    }
    relayOnline = false; setStatus('Relay','off','시간 초과');
  } catch { relayOnline=false; setStatus('Relay','off','연결 오류'); }
}
async function checkBridge() {
  try {
    const rows = await sgRaw('commands', 'id=eq.bridge-heartbeat&select=result');
    if (rows.length && rows[0].result) {
      const ago = Math.floor((Date.now()-new Date(rows[0].result).getTime())/1000);
      if (ago < 120) { bridgeOnline=true; setStatus('Bridge','on','온라인'); return; }
    }
    bridgeOnline=false; setStatus('Bridge','wait','대기 중');
  } catch { bridgeOnline=false; setStatus('Bridge','off','연결 오류'); }
}

function setStatus(which, state, label) {
  // Sidebar dots
  const dot = document.getElementById('dot'+which);
  const lbl = document.getElementById('lbl'+which);
  if (dot) dot.className = 'dot '+state;
  if (lbl) lbl.textContent = which==='Relay' ? '릴레이 ('+label+')' : '브릿지 ('+label+')';
  // Right panel connector dots
  const cd  = document.getElementById('connDot'+which);
  const cl  = document.getElementById('connLbl'+which);
  if (cd)   cd.className = 'conn-dot '+state;
  if (cl)   cl.textContent = label;
}

/* ════════════════════════════════════════
   UTILITIES
════════════════════════════════════════ */
function scrollBot() {
  const w = document.getElementById('messagesWrap');
  w.scrollTop = w.scrollHeight;
}
function setWaiting(on) {
  waiting = on;
  document.getElementById('typingWrap').classList.toggle('show', on);
  document.getElementById('sendBtn').disabled = on;
}
function lightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function setupInput() {
  const inp = document.getElementById('msgInput');
  inp.addEventListener('keydown', e => {
      if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); }
    });
    inp.addEventListener('keyup', e => {
      if (e.key==='Enter' && !e.shiftKey && !e.isComposing) { sendMessage(); }
    });
  inp.addEventListener('input', autoResize);
}
function autoResize() {
  const inp = document.getElementById('msgInput');
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, dur=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', async () => {
  setupInput();
  loadHistory();
  createNewChat();
  await Promise.all([checkRelay(), checkBridge()]);
  setInterval(checkRelay,  15000);
  setInterval(checkBridge, 30000);
});
</script>
