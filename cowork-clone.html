.chat-item:hover{background:var(--bg-hover);color:var(--text)}

.chat-item .delete-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:none;background:none;border:none;color:#e55;cursor:pointer;font-size:16px;padding:2px 6px}

.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);text-align:center}

.chat-header .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.online{background:#4a4}
.status-dot.offline{background:#a44}
.status-dot.streaming{background:#fa0;animation:pulse 1s infinite}

.messages{flex:1;overflow-y:auto;padding:20px 0;scroll-behavior:smooth}
.messages-inner{max-width:760px;margin:0 auto;padding:0 24px}

function subscribeRealtime(chatId) {
  unsubscribeRealtime();

  realtimeChannel = sb.channel('chat-' + chatId)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'messages',
      filter: 'chat_id=eq.' + chatId,
    }, payload => {
      if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
        handleRealtimeMessage(payload.new);
      }
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') {
        setStatus('online', '矛聴掳锚虏掳毛聬篓');
        // Realtime 矛聻聢矛聹录毛漏聰 铆聫麓毛搂聛 毛聤聬毛娄卢锚虏聦
        startPoll(5000);
      }
    });

  // Realtime 矛聥陇铆聦篓 毛聦聙毛鹿聞 铆聫麓毛搂聛
  startPoll(POLL_MS);
}

function unsubscribeRealtime() {
  if (realtimeChannel) {
    sb.removeChannel(realtimeChannel);
    realtimeChannel = null;
  }
  stopPoll();
}

function handleRealtimeMessage(msg) {
  if (!msg || msg.chat_id !== currentChatId) return;
  hideEmpty();
  renderMessage(msg);

  if (msg.role === 'assistant' && (msg.status === 'streaming' || msg.status === 'processing')) {
    setStatus('streaming', '矛聺聭毛聥碌 矛陇聭...');
  } else if (msg.role === 'assistant' && msg.status === 'completed') {
    setStatus('online', '矛陇聙毛鹿聞');
  } else if (msg.role === 'assistant' && msg.status === 'error') {
    setStatus('online', '矛聵陇毛楼聵 毛掳聹矛聝聺 - 毛聥陇矛聥聹 矛聥聹毛聫聞铆聲麓矛拢录矛聞赂矛職聰');
  }

  scrollBottom();
}

function startPoll(interval) {
  stopPoll();
  pollTimer = setInterval(() => pollMessages(), interval);
}

function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function pollMessages() {
  if (!currentChatId) return;
  try {
    const { data } = await sb.from('messages')
      .select('*')
      .eq('chat_id', currentChatId)
      .order('created_at', { ascending: true });
    if (data) {
      let hasProcessing = false;
      for (const msg of data) {
        hideEmpty();
        renderMessage(msg);
        if (msg.status === 'processing' || msg.status === 'pending') hasProcessing = true;
      }
      // Speed up polling when actively processing
      if (hasProcessing && pollTimer) {
        stopPoll();
        startPoll(800);
      }
      scrollBottom();
    }
  } catch (_) {}
}

// 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
//  毛漏聰矛聥聹矛搂聙 毛聽聦毛聧聰毛搂聛
// 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function renderMessage(msg) {
  const hash = msg.status + '|' + (msg.content || '').length + '|' + (msg.content || '').slice(-50);
  if (renderedMsgs[msg.id] === hash) return;
  renderedMsgs[msg.id] = hash;

  let el = document.getElementById('msg-' + msg.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'msg-' + msg.id;
    el.className = 'message ' + (msg.role === 'user' ? 'msg-user' : 'msg-assistant');
    document.getElementById('messagesInner').appendChild(el);
  }

  if (msg.role === 'user') {
    // Extract main text (before ---\n冒聼聯聨 or ---\n冒聼聳录茂赂聫)
    let displayText = msg.content || '';
    const attachSep = displayText.indexOf('\n\n---\n冒聼聯聨');
    const imgSep = displayText.indexOf('\n\n---\n冒聼聳录茂赂聫');
    const sepIdx = Math.min(
      attachSep >= 0 ? attachSep : Infinity,
      imgSep >= 0 ? imgSep : Infinity
    );
    if (sepIdx < Infinity) {
      displayText = displayText.slice(0, sepIdx);
    }
    let attachInfo = '';
    if (sepIdx < Infinity) {
      // Show a compact attachment indicator
      const attachPart = msg.content.slice(sepIdx);
      const fileMatches = attachPart.match(/- (.+?) \(/g);
      if (fileMatches) {
        attachInfo = fileMatches.map(m => {
          const name = m.replace(/^- /, '').replace(/ \($/, '');
          return `<div class="file-attach">冒聼聯聨 ${escHtml(name)}</div>`;
        }).join('');
      }
    }
    el.innerHTML = `<div class="msg-bubble">${escHtml(displayText)}${attachInfo}</div>`;
    return;
  }

  // Assistant 毛漏聰矛聥聹矛搂聙
  let blocks = [];
  let isStreaming = false;
  try {
    const parsed = JSON.parse(msg.content);
    if (parsed.blocks) {
      blocks = parsed.blocks;
      isStreaming = parsed.streaming === true;
    } else {
      blocks = [{ type: 'text', text: msg.content }];
    }
  } catch (_) {
    blocks = [{ type: 'text', text: msg.content || '' }];
  }

  // Filter out status blocks if there's real content (text/thinking/tool)
  const hasRealContent = blocks.some(b => b.type === 'text' || b.type === 'thinking' || b.type === 'tool');
  if (hasRealContent) {
    blocks = blocks.filter(b => b.type !== 'status');
  }

  let html = '<div class="msg-avatar">C</div><div class="msg-content">';
  for (const block of blocks) {
    html += renderBlock(block, isStreaming);
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderBlock(block, isStreaming) {
  switch (block.type) {
    case 'thinking':
      const preview = (block.text || '').slice(0, 80).replace(/\n/g, ' ');
      const id = 'think-' + Math.random().toString(36).slice(2, 8);
      return `<div class="block-thinking">
        <div class="think-header" onclick="toggleThink('${id}')">
          <span class="think-arrow" id="arrow-${id}">芒聳露</span>
          <span>矛聝聺锚掳聛 矛陇聭...</span>
          <span style="color:var(--text-dim);font-size:12px;margin-left:auto">${(block.text||'').length}矛聻聬</span>
        </div>
        <div class="think-body" id="body-${id}">${escHtml(block.text || '')}</div>
      </div>`;

    case 'text':
      const textContent = block.text || '';
      if (!textContent.trim()) return '';
      const rendered = renderMarkdown(textContent);
      return `<div class="block-text${isStreaming ? ' streaming-cursor' : ''}">${rendered}</div>`;

    case 'tool':
      const icons = { screenshot:'冒聼聯路', click:'冒聼聳卤茂赂聫', type_text:'芒聦篓茂赂聫', key_send:'芒聦篓茂赂聫', run_ps:'芒職隆', run_cmd:'芒職隆', read_file:'冒聼聯聞', write_file:'冒聼聯聺', list_dir:'冒聼聯聛', list_windows:'冒聼陋聼', activate_window:'冒聼陋聼', start_app:'冒聼職聙', double_click:'冒聼聳卤茂赂聫' };
      return `<div class="block-tool">
        <div class="tool-header">
          <span class="tool-icon">${icons[block.action] || '冒聼聰搂'}</span>
          <span class="tool-action">${escHtml(block.action || '')}</span>
          <span class="tool-status ${block.status || 'running'}">${block.status || 'running'}</span>
        </div>
        ${block.target ? `<div class="tool-target">${escHtml(block.target)}</div>` : ''}
        ${block.result ? `<div class="tool-result">${escHtml(block.result.slice(0, 500))}</div>` : ''}
      </div>`;

    case 'error':
      return `<div class="block-error"><span>芒職聽茂赂聫 ${escHtml(block.text || '')}</span><button class="retry-btn" onclick="retryLastMessage()">矛聻卢矛聥聹毛聫聞</button></div>`;

    case 'status':
      return `<div class="block-status">${escHtml(block.text || '')}</div>`;

    default:
      return '';
  }
}

function toggleThink(id) {
  const body = document.getElementById('body-' + id);
  const arrow = document.getElementById('arrow-' + id);
  if (body) {
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  }
}

function renderMarkdown(text) {
  try {
    return marked.parse(text, { breaks: true, gfm: true });
  } catch (_) {
    return escHtml(text).replace(/\n/g, '<br>');
  }
}

function escHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text && pendingAttachments.length === 0) return;

  // 矛卤聞铆聦聟 矛聴聠矛聹录毛漏麓 矛聝聺矛聞卤
  if (!currentChatId) newChat();

  // 矛卤聞铆聦聟 矛聽聹毛陋漏 矛聴聟毛聧掳矛聺麓铆聤赂 (矛虏芦 毛漏聰矛聥聹矛搂聙)
  if (chats[currentChatId] && chats[currentChatId].title === '矛聝聢 毛聦聙铆聶聰') {
    chats[currentChatId].title = (text || pendingAttachments[0]?.name || '铆聦聦矛聺录 矛虏篓毛露聙').slice(0, 30);
    saveChats();
    renderChatList();
  }

  // Build content with attachments
  const fullContent = buildAttachmentMessage(text);
  const attachHtml = getAttachmentHtml();

  input.value = '';
  autoResize(input);
  hideEmpty();
  setStatus('streaming', '矛聽聞矛聠隆 矛陇聭...');

  const msgId = 'u-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 6);

  // 矛娄聣矛聥聹 UI矛聴聬 铆聭聹矛聥聹 (with attachments)
  const el = document.createElement('div');
  el.id = 'msg-' + msgId;
  el.className = 'message msg-user';
  el.innerHTML = `<div class="msg-bubble">${escHtml(text)}${attachHtml}</div>`;
  document.getElementById('messagesInner').appendChild(el);
  renderedMsgs[msgId] = 'sent';
  scrollBottom();

  // Clear attachments
  pendingAttachments = [];
  renderAttachments();

  // Supabase矛聴聬 矛聽聙矛聻楼
  try {
    await sb.from('messages').insert({
      id: msgId,
      chat_id: currentChatId,
      role: 'user',
      content: fullContent,
      status: 'pending',
    });
    setStatus('streaming', '矛聺聭毛聥碌 毛聦聙锚赂掳...');
  } catch (e) {
    console.error('矛聽聞矛聠隆 矛聥陇铆聦篓:', e);
    setStatus('offline', '矛聽聞矛聠隆 矛聥陇铆聦篓');
  }
}

function setupInput() {
  const input = document.getElementById('inputBox');

  input.addEventListener('compositionstart', () => { composing = true; });
  input.addEventListener('compositionend', () => { composing = false; });

  input.addEventListener('keydown', (e) => {
    if (composing || e.keyCode === 229) return; // IME 矛隆掳铆聲漏 矛陇聭

    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', () => autoResize(input));
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function hideEmpty() {
  const empty = document.getElementById('emptyState');
  if (empty) empty.style.display = 'none';
}

function scrollBottom() {
  const el = document.getElementById('messages');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + type;
  txt.textContent = text;
}

async function retryLastMessage() {
  if (!currentChatId) return;
  try {
    // Find the last user message in this chat
    const { data } = await sb.from('messages')
      .select('id,status')
      .eq('chat_id', currentChatId)
      .eq('role', 'user')
      .order('created_at', { ascending: false })
      .limit(1);
    if (data && data.length > 0) {
      const lastUser = data[0];
      // Reset to pending so relay picks it up again
      await sb.from('messages').update({ status: 'pending' }).eq('id', lastUser.id);
      // Delete the failed assistant message
      const { data: assistMsgs } = await sb.from('messages')
        .select('id')
        .eq('chat_id', currentChatId)
        .eq('role', 'assistant')
        .eq('status', 'error')
        .order('created_at', { ascending: false })
        .limit(1);
      if (assistMsgs && assistMsgs.length > 0) {
        await sb.from('messages').delete().eq('id', assistMsgs[0].id);
        const el = document.getElementById('msg-' + assistMsgs[0].id);
        if (el) el.remove();
        delete renderedMsgs[assistMsgs[0].id];
      }
      setStatus('streaming', '矛聻卢矛聥聹毛聫聞 矛陇聭...');
    }
  } catch (e) {
    console.error('Retry failed:', e);
  }
}

// File input change
document.getElementById('fileInput').addEventListener('change', (e) => {
  handleFiles(e.target.files);
  e.target.value = '';
});

// Drag & drop
document.addEventListener('dragover', (e) => {
  e.preventDefault();
  document.getElementById('fileDropOverlay').classList.add('active');
});
document.addEventListener('dragleave', (e) => {
  if (e.relatedTarget === null) {
    document.getElementById('fileDropOverlay').classList.remove('active');
  }
});
document.addEventListener('drop', (e) => {
  e.preventDefault();
  document.getElementById('fileDropOverlay').classList.remove('active');
  if (e.dataTransfer.files.length > 0) {
    handleFiles(e.dataTransfer.files);
  }
});

// Paste image (Ctrl+V)
document.getElementById('inputBox').addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (file) handleImageFile(file);
      return;
    }
  }
});

function handleFiles(fileList) {
  for (const file of fileList) {
    if (file.type.startsWith('image/')) {
      handleImageFile(file);
    } else {
      // Non-image file: store name/size, will be processed on company PC
      const attach = {
        name: file.name,
        size: file.size,
        type: file.type || 'application/octet-stream',
        isImage: false,
      };
      // Try to read small text files (<100KB)
      if (file.size < 100000 && isTextFile(file.name)) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          attach.textContent = ev.target.result.slice(0, 50000);
          pendingAttachments.push(attach);
          renderAttachments();
        };
        reader.readAsText(file);
      } else {
        // For large/binary/DRM files, just record metadata
        // Claude will use bridge commands to read the file on company PC
        pendingAttachments.push(attach);
        renderAttachments();
      }
    }
  }
}

function handleImageFile(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    pendingAttachments.push({
      name: file.name || 'pasted-image.png',
      size: file.size,
      type: file.type,
      isImage: true,
      dataUrl: dataUrl,
      // Store base64 without prefix for sending
      base64: dataUrl.split(',')[1],
    });
    renderAttachments();
  };
  reader.readAsDataURL(file);
}

function isTextFile(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  return ['txt','csv','json','xml','html','htm','css','js','ts','py','java','c','cpp','h','md','yaml','yml','ini','cfg','log','sql','sh','bat','ps1','vbs'].includes(ext);
}

function renderAttachments() {
  const el = document.getElementById('attachments');
  el.innerHTML = pendingAttachments.map((a, i) => {
    const icon = a.isImage ? '冒聼聳录茂赂聫' : getFileIcon(a.name);
    const sizeStr = a.size > 1024*1024 ? (a.size/1024/1024).toFixed(1)+'MB' : (a.size/1024).toFixed(0)+'KB';
    const preview = a.isImage ? `<img src="${a.dataUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:4px">` : '';
    return `<div class="attach-item">
      ${preview || `<span class="icon">${icon}</span>`}
      <span class="name">${escHtml(a.name)}</span>
      <span style="color:var(--text-dim);font-size:11px">${sizeStr}</span>
      <span class="remove" onclick="removeAttachment(${i})">脙聴</span>
    </div>`;
  }).join('');
}

function removeAttachment(idx) {
  pendingAttachments.splice(idx, 1);
  renderAttachments();
}

function getFileIcon(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  const icons = {xlsx:'冒聼聯聤',xls:'冒聼聯聤',csv:'冒聼聯聤',doc:'冒聼聯聞',docx:'冒聼聯聞',pdf:'冒聼聯聲',pptx:'冒聼聯聤',ppt:'冒聼聯聤',zip:'冒聼聯娄',rar:'冒聼聯娄',jpg:'冒聼聳录茂赂聫',png:'冒聼聳录茂赂聫',gif:'冒聼聳录茂赂聫',mp4:'冒聼聨卢',mp3:'冒聼聨碌',txt:'冒聼聯聺',json:'冒聼聯聥',xml:'冒聼聯聥',html:'冒聼聦聬'};
  return icons[ext] || '冒聼聯聛';
}

function buildAttachmentMessage(text) {
  // Build message that includes attachment info for Claude
  if (pendingAttachments.length === 0) return text;

  let parts = [];
  let imageAttachments = [];
  let fileAttachments = [];

  for (const a of pendingAttachments) {
    if (a.isImage) {
      imageAttachments.push(a);
    } else {
      fileAttachments.push(a);
    }
  }

  // Add text content from attachments
  if (fileAttachments.length > 0) {
    parts.push('\n\n---\n冒聼聯聨 矛虏篓毛露聙铆聦聦矛聺录:');
    for (const f of fileAttachments) {
      parts.push(`\n- ${f.name} (${f.type}, ${(f.size/1024).toFixed(0)}KB)`);
      if (f.textContent) {
        parts.push('\n```\n' + f.textContent.slice(0, 10000) + '\n```');
      } else {
        parts.push('\n芒職聽茂赂聫 DRM 毛聵聬毛聤聰 毛掳聰矛聺麓毛聞聢毛娄卢 铆聦聦矛聺录 - 铆職聦矛聜卢 PC矛聴聬矛聞聹 bridge 毛陋聟毛聽鹿矛聹录毛隆聹 矛聺聟矛聳麓矛聲录 铆聲漏毛聥聢毛聥陇.');
        parts.push(`\nhint: run_ps毛隆聹 铆聦聦矛聺录矛聺聞 矛聴麓锚卤掳毛聜聵 COM 锚掳聺矛虏麓毛隆聹 毛聜麓矛職漏矛聺聞 矛露聰矛露聰铆聲聵矛聞赂矛職聰.`);
      }
    }
  }

  if (imageAttachments.length > 0) {
    parts.push('\n\n---\n冒聼聳录茂赂聫 矛聺麓毛炉赂矛搂聙 矛虏篓毛露聙:');
    for (const img of imageAttachments) {
      parts.push(`\n- ${img.name} (${(img.size/1024).toFixed(0)}KB)`);
      // Save base64 to temp file on company PC via bridge?
      // For now, note that image was attached but Claude CLI can't see images
      parts.push('\n芒職聽茂赂聫 矛掳赂锚鲁聽: Claude CLI毛聤聰 矛聺麓毛炉赂矛搂聙毛楼录 矛搂聛矛聽聭 毛鲁录 矛聢聵 矛聴聠矛聤碌毛聥聢毛聥陇. bridge矛聺聵 run_ps毛隆聹 OCR 毛聵聬毛聤聰 矛聺麓毛炉赂矛搂聙 毛露聞矛聞聺矛聺麓 铆聲聞矛職聰铆聲漏毛聥聢毛聥陇.');
    }
  }

  return text + parts.join('');
}

function getAttachmentHtml() {
  // HTML for showing attachments in the user message bubble
  let html = '';
  for (const a of pendingAttachments) {
    if (a.isImage && a.dataUrl) {
      html += `<img class="attached-img" src="${a.dataUrl}" alt="${escHtml(a.name)}">`;
    } else {
      const icon = getFileIcon(a.name);
      html += `<div class="file-attach">${icon} ${escHtml(a.name)}</div>`;
    }
  }
  return html;
}
